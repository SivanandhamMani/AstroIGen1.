function norm(x) { return ((x % 360) + 360) % 360; }
function toRad(x) { return x * Math.PI / 180; }
function toDeg(x) { return x * 180 / Math.PI; }

function julianDay(yr, mo, dy, utHr) {
  const A = Math.floor((14 - mo) / 12);
  const Y = yr + 4800 - A;
  const M = mo + 12 * A - 3;
  const jd = dy + Math.floor((153*M+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045;
  return jd - 0.5 + utHr / 24.0;
}

// ─── Thirukanidham / Lahiri Ayanamsa ────────────────────────────────────────
// Uses the standard Lahiri (Chitrapaksha) ayanamsa as published in the
// Indian Astronomical Ephemeris and adopted by Thirukanidham practitioners.
// Reference epoch: J2000.0 (JD 2451545.0)
// Formula matches the values printed in Thirukanidham panchang tables.
function lahiriAyanamsa(T) {
  // Nutation in longitude (Δψ) — short-period terms sufficient for KP use
  var omega = toRad(125.04452 - 1934.136261 * T + 0.0020708 * T * T);
  var L0    = toRad(280.4664567 + 36000.76983 * T);
  var L1    = toRad(218.3165437 + 481267.88123 * T);
  var dpsi  = (-17.20 * Math.sin(omega) - 1.32 * Math.sin(2 * L0)
               - 0.23 * Math.sin(2 * L1) + 0.21 * Math.sin(2 * omega)) / 3600.0;

  // Lahiri / Chitrapaksha ayanamsa base (Spica = 0° Chitra / 180° sidereal)
  // Base value at J1900.0 = 22°27'57.5" = 22.46597°; rate = 50.2388475"/yr
  var ayanBase = 22.46597 + (T + 1.0) * 1.3960 // T+1 converts J2000 base to J1900 base
               + 0.000308 * T * T;              // second-order secular term

  // Thirukanidham correction: add nutation component (dpsi) as used in
  // traditional South-Indian panchang ayanamsa values
  return ayanBase + dpsi;
}

// Accurate true obliquity of the ecliptic (needed for precise Lagna)
function trueObliquity(T) {
  var omega = toRad(125.04452 - 1934.136261 * T);
  var L0    = toRad(280.4664567 + 36000.76983 * T);
  var L1    = toRad(218.3165437 + 481267.88123 * T);
  // Mean obliquity (IAU 1980)
  var eps0  = 23.0 + 26.0/60.0 + 21.448/3600.0
              - (46.8150/3600.0) * T
              - (0.00059/3600.0) * T * T
              + (0.001813/3600.0) * T * T * T;
  // Nutation in obliquity (Δε)
  var deps  = (9.20 * Math.cos(omega) + 0.57 * Math.cos(2 * L0)
              + 0.10 * Math.cos(2 * L1) - 0.09 * Math.cos(2 * omega)) / 3600.0;
  return eps0 + deps;
}

function earthHelio(T) {
  const e = 0.01670862 - 0.000042037*T;
  const L = norm(100.464457 + 35999.372476*T);
  const w = norm(102.937348 + 0.322503*T);
  const M = norm(L - w);
  const Mr = toRad(M);
  const E = M + toDeg(e*Math.sin(Mr) + e*e/2*Math.sin(2*Mr));
  const Er = toRad(E);
  const v = norm(2*toDeg(Math.atan2(Math.sqrt(1+e)*Math.sin(Er/2), Math.sqrt(1-e)*Math.cos(Er/2))));
  const Lh = norm(v + w);
  const rr = (1.000001018*(1-e*e))/(1+e*Math.cos(toRad(v)));
  return { x: rr*Math.cos(toRad(Lh)), y: rr*Math.sin(toRad(Lh)) };
}

function planetHelio(a0,e0,de,L0,dL,w0,dw,T) {
  const e = e0+de*T, L = norm(L0+dL*T), w = norm(w0+dw*T), M = norm(L-w);
  const Mr = toRad(M);
  const E = M + toDeg(e*Math.sin(Mr)+e*e/2*Math.sin(2*Mr)+e*e*e/8*(3*Math.sin(3*Mr)-Math.sin(Mr)));
  const Er = toRad(E);
  const v = norm(2*toDeg(Math.atan2(Math.sqrt(1+e)*Math.sin(Er/2), Math.sqrt(1-e)*Math.cos(Er/2))));
  const Lh = norm(v+w);
  const rr = (a0*(1-e*e))/(1+e*Math.cos(toRad(v)));
  return { x: rr*Math.cos(toRad(Lh)), y: rr*Math.sin(toRad(Lh)) };
}

function geoLon(px,py,ex,ey) { return norm(toDeg(Math.atan2(py-ey, px-ex))); }

// ─── Sun — accurate apparent longitude (matches Thirukanidham tables) ────────
function calcSun(T) {
  // Geometric mean longitude & mean anomaly
  var L0 = norm(280.46646  + 36000.76983 * T + 0.0003032 * T * T);
  var M  = norm(357.52911  + 35999.05029 * T - 0.0001537 * T * T);
  var Mr = toRad(M);
  // Equation of centre
  var C  = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mr)
         + (0.019993 - 0.000101 * T)                     * Math.sin(2 * Mr)
         +  0.000289                                      * Math.sin(3 * Mr);
  var sunLon = norm(L0 + C);
  // Apparent longitude: correct for aberration & nutation (Δψ term)
  var omega   = toRad(125.04 - 1934.136 * T);
  var apparent = norm(sunLon - 0.00569 - 0.00478 * Math.sin(omega));
  return apparent;
}

function calcMoon(T) {
  const Lp = 218.3164477+481267.88123421*T-0.0015786*T*T;
  const D  = 297.8501921+445267.1114034*T-0.0018819*T*T;
  const M  = 357.5291092+35999.0502909*T-0.0001536*T*T;
  const Mp = 134.9633964+477198.8675055*T+0.0087414*T*T;
  const F  = 93.2720950+483202.0175233*T-0.0036539*T*T;
  const E  = 1 - 0.002516*T;
  const r  = toRad;
  const dL = 6288774*Math.sin(r(Mp)) + 1274027*Math.sin(r(2*D-Mp)) + 658314*Math.sin(r(2*D))
    + 213618*Math.sin(r(2*Mp)) - 185116*E*Math.sin(r(M)) - 114332*Math.sin(r(2*F))
    + 58793*Math.sin(r(2*D-2*Mp)) + 57066*E*Math.sin(r(2*D-M-Mp)) + 53322*Math.sin(r(2*D+Mp))
    + 45758*E*Math.sin(r(2*D-M)) - 40923*E*Math.sin(r(M-Mp)) - 34720*Math.sin(r(D))
    - 30383*E*Math.sin(r(M+Mp)) + 15327*Math.sin(r(2*D-2*F)) + 10980*Math.sin(r(Mp-2*F))
    + 10675*Math.sin(r(4*D-Mp)) + 10034*Math.sin(r(3*Mp)) + 8548*Math.sin(r(4*D-2*Mp))
    - 7888*E*Math.sin(r(2*D+M-Mp)) - 6766*E*Math.sin(r(2*D+M)) - 5163*Math.sin(r(D+Mp));
  return norm(Lp + dL/1e6);
}

// Apparent Moon longitude: apply nutation Δψ to geometric position
function calcMoonApparent(T) {
  var geom  = calcMoon(T);
  var omega = toRad(125.04452 - 1934.136261 * T);
  var L0    = toRad(280.4664567 + 36000.76983 * T);
  var L1    = toRad(218.3165437 + 481267.88123 * T);

               - 0.23 * Math.sin(2 * L1) + 0.21 * Math.sin(2 * omega)) / 3600.0;
  return norm(geom + dpsi);
}

function calcRahu(T) { return norm(125.04452 - 1934.136261*T + 0.0020708*T*T + T*T*T/450000); }

function vsopSum(terms, tau) {
  var s=0; for(var i=0;i<terms.length;i++) s+=terms[i][0]*Math.cos(terms[i][1]+terms[i][2]*tau); return s;
}
function earthLR(tau) {
  var L0=[[1.75347045673,0,0],[0.03341656456,4.66925680417,6283.07584999],[0.00034894275,4.62610086489,12566.15169998],[0.00003417572,2.82886579606,3.52311835]];
  var L1=[[6283.07584999,0,0],[0.00206058863,2.67823455584,6283.07584999]];
  var R0=[[1.00013988784,0,0],[0.01669674154,3.09856460287,6283.07584999],[0.00013956024,3.05524609456,12566.15169998]];
  var R1=[[-0.00420710028,0,0],[0.00001689461,4.62892189486,6283.07584999]];
  var L=norm(toDeg(vsopSum(L0,tau)+vsopSum(L1,tau)*tau));
  var R=vsopSum(R0,tau)+vsopSum(R1,tau)*tau;
  return {L:L, R:R};
}

function calcPluto(T) {
  var e=0.24882730+0.00000030*T, L=norm(238.958116+144.9600000*T), w_full=norm(224.069617);
  var W=toRad(110.303921), omega=toRad(norm(w_full-110.303921)), i=toRad(17.14175);

// ─── Lagna (Ascendant) — Thirukanidham method ───────────────────────────────
// Uses accurate GMST (IAU 1982), true obliquity, and the standard
// trigonometric formula as in Thirukanidham / KP ephemeris.
function calcAscendant(jd, T, lat, lon, ayan) {
  // Greenwich Mean Sidereal Time (degrees) — IAU 1982 formula
  var gmst = norm(
    280.46061837
    + 360.98564736629 * (jd - 2451545.0)
    + 0.000387933 * T * T
    - T * T * T / 38710000.0
  );
  // Local Sidereal Time
  var lst  = norm(gmst + lon);
  var eps  = trueObliquity(T);   // true obliquity with nutation

  var lr  = toRad(lst);
  var la  = toRad(lat);
  var er  = toRad(eps);

  // Standard ascendant formula (used in all KP / Thirukanidham software)
  var ascTrop = norm(
    toDeg(Math.atan2(Math.cos(lr),
      -(Math.sin(lr) * Math.cos(er) + Math.tan(la) * Math.sin(er))))
  );
  var ascSid = norm(ascTrop - ayan);
  return { tropDeg: ascTrop, sidDeg: ascSid, ...getKP(ascSid) };
}

function calcHouseCusps(jd, T, lat, lon, ayan) {
  // KP system uses Porphyry house system:
  // Divide each quadrant (ASC->IC, IC->DSC, DSC->MC, MC->ASC) into 3 equal parts
  var eps  = trueObliquity(T);   // Thirukanidham: use true obliquity with nutation
  var gmst = norm(280.46061837 + 360.98564736629*(jd-2451545.0) + 0.000387933*T*T - T*T*T/38710000.0);
  var ramc = norm(gmst + lon);
  var ramcR = toRad(ramc), latR = toRad(lat), epsR = toRad(eps);

  // Tropical ASC
  var ascTrop = norm(toDeg(Math.atan2(
    Math.cos(ramcR),
    -(Math.sin(ramcR)*Math.cos(epsR) + Math.tan(latR)*Math.sin(epsR))
  )));

  // Tropical MC
  var mcTrop = norm(toDeg(Math.atan2(Math.tan(ramcR), Math.cos(epsR))));
  if (Math.cos(ramcR) < 0) mcTrop = norm(mcTrop + 180);

  // Sidereal angles
  var asc = norm(ascTrop - ayan);
  var mc  = norm(mcTrop  - ayan);
  var ic  = norm(mc  + 180);
  var dsc = norm(asc + 180);

  // Porphyry: divide each quadrant into 3 equal arcs
  // Arc going forward (counterclockwise) from start to end
  function arcFwd(start, end) { return norm(end - start); }

  var q1 = arcFwd(asc, ic);   // Q1: ASC -> IC  (H2,H3 inside)
  var q2 = arcFwd(ic,  dsc);  // Q2: IC  -> DSC (H5,H6 inside)
  var q3 = arcFwd(dsc, mc);   // Q3: DSC -> MC  (H8,H9 inside)
  var q4 = arcFwd(mc,  asc);  // Q4: MC  -> ASC (H11,H12 inside)

  var h2  = norm(asc + q1/3);
  var h3  = norm(asc + 2*q1/3);
  var h5  = norm(ic  + q2/3);
  var h6  = norm(ic  + 2*q2/3);
  var h8  = norm(dsc + q3/3);
  var h9  = norm(dsc + 2*q3/3);
  var h11 = norm(mc  + q4/3);
  var h12 = norm(mc  + 2*q4/3);

  var sidCusps = [asc, h2, h3, ic, h5, h6, dsc, h8, h9, mc, h11, h12];

  return sidCusps.map(function(sid, i) {
    return { house:i+1, d:sid, sidDeg:sid, ri:Math.floor(sid/30)%12, ...getKP(sid) };
  });
}

2:"பேச்சுத்திறன். முக லட்சணம். பார்வைத்திறன். சுவையான உணவுகளை உட்கொள்ளும் அமைப்பு. பணம், பணம் வரும் வழி செல்லும் வழி. எளிதில் பணமாக மாற்ற கூடிய பொருள்கள் (தானியங்கள், உலோகங்கள், ரத்தினங்கள், நகைகள், தங்கம், வெள்ளி). உடலில் உற்பத்தியாகும் சக்தி. ஒருவர் தன்னுடைய சொந்த கருத்துக்களை விளக்கும் தன்மை. ஒருவர் தன்னுடைய செல்வத்தை அனுபவிக்கும் யோகம். குடும்பத்தில் உள்ள உறுப்பினர்கள். வாய், பல், நாக்கு, கண், தொண்டை, முகம், மூக்கு, தாடை, கண்ணம். தாயின் மூத்த சகோதரம் (பெரியம்மா, மாமா). வாழ்க்கைத் துணையின் மரணம்.",
3:"காது, கைகள், தோல்பட்டை, கழுத்தில் செல்லும் நரம்பு மண்டலங்கள், ரத்த நாளங்கள், உணர்வு புலன்கள். இளைய சகோதரர்கள், இளைய சகோதரிகள், மாமனார். தந்தையின் சகோதரம், சகோதரி மற்றும் அவர்களின் குழந்தைகள். தகவல் பரிமாற்றங்கள். தைரியம், பயந்த சுவாசம். மனம், மனக்குழப்பம், மனநிலை பாதித்தல், பைத்தியம், மனநிலை மருத்துவர். ஞாபக சக்தி, ஞாபக மறதி. உடல் மெலிதல். செய்திகள், ரேடியோ, கைபேசி, தொலைபேசி, கணினி. சொத்துக்களை இழத்தல், விற்பனை செய்தல். இடமாற்றம், பக்கத்து ஊர், அண்டைய மாநிலம். தனிகுடித்தனம். வெளியூர், சிறிய தூர பயணம், போக்குவரத்து துறை. கையெழுத்து, பத்திரிக்கை, விளம்பரம், நூலகம், அச்சு. வதந்திகள், பொய் சொல்லுதல். விற்பனை செய்தல். ஒப்பந்தம், ஒப்பந்தத் தொழில். டெண்டர் வேலை. இடத்தையோ அல்லது தொழிலையோ லீசுக்கு எடுத்து செய்தல். தகவல் தொடர்பு சாதனங்கள், தொலைக்காட்சி. Software Engineer போன்ற தகவல் தொடர்பு சார்ந்த துறை.",
4:"மார்பு பகுதி, உடலில் உற்பத்தி செய்யும் உறுப்புகள். எப்போதும் இயங்கிக் கொண்டிருக்கும் உறுப்புகளான சிறுநீரகங்கள், இருதயம், நுரையீரல். தாய், தாய்வழிச் சொத்து. அந்தரங்க வாழ்க்கை, ஆரம்பக்கல்வி, ஆரம்பக் கல்வி ஆசிரியர், பள்ளிகள், கல்லூரிகள். உயிரற்ற பொருட்களை உற்பத்தி செய்தல் (செங்கல், ஜல்லி, கம்பிகள், சிமெண்ட், வாகன உதிரி பாகங்கள்). எளிதில் தூக்க முடியாத வீட்டு உபயோக பொருட்கள் (பீரோ, பிரிட்ஜ், வாஷிங் மெஷின், நாற்காலி). உள்ளூர், இருப்பிடம், சொந்த நாடு, ஒரே இடத்தில் நிலையாக இருத்தல், வீடு, நிலம், வாகனம், அசையாச் சொத்துக்கள். கற்பு, உடல் சார்ந்த ஒழுக்கம், மலட்டுத் தன்மை, உடல் பருமன். மனப்பாடம் செய்தல். மெருகு ஊட்டப்படாத மூலப்பொருட்கள். நாத்திகம், அறிவுபூர்வமான சிந்தனை. யூகங்கள் மீது நம்பிக்கை இல்லாதவர்கள். செல்வத்தை அதிகமாகப் பெருக்குதல், தேவைக்கு அதிகமாக கையிருப்பு பணம். இயந்திரத்தனமான வாழ்க்கை. ஜடப்பொருள், திடப்பொருள், தானிய வகைகள், பண்ணைகள், ஞாபகச் சின்னங்கள், புராதன பொருட்கள். மூதாதையர் சொத்துக்கள். கிணறு, ஆறு, ஏரி, குளம், கல்லறை, சுடுகாடு. கட்டிட தொழில்கள், ரியல் எஸ்டேட், சிவில் இன்ஜினியர், மெக்கானிக்கல் இன்ஜினியர். கூட்டுக்குடும்பம், கூட்டுத்தொழில், சிக்கனம். வாகனம், வாகனம் சார்ந்த தொழில்கள், ஆட்டோ மொபைல்ஸ், சிறிய உற்பத்தி சார்ந்த தொழில்கள்.",
5:"இதயம், முதுகுப்பகுதி, பாலியல் ஹார்மோன்கள், உயிர் அணுக்கள். மதிநுட்பம், ஒரு உயிரை உருவாக்கும் சக்தி. கலைகளில் ஆர்வம், உடலை வருந்தாமல் இருத்தல். சிற்றின்பத்தில் அதிக நாட்டம், கமிஷன், கவர்ச்சிக்கு மயங்குதல். பொழுதுபோக்கு விஷயங்கள், அழகுபடுத்திக் கொள்ளுதல். ரசனை, உல்லாசம், விளையாட்டு, ஆழ்ந்த சிந்தனை. ஆரோக்கியமான உடல்வாகு. பகையை வளர்த்துக்காத்திருத்தல். கடன் அடைத்தல் அல்லது கடன் வாங்காது இருத்தல். விருந்தோம்பல். கேளிக்கைகள், சூதாட்டம், சினிமா, நாடகம், இசை, கச்சேரி. மந்திரம் ஜபித்தல், தெய்வீக அருள், மிகப்பெரிய இலக்கண படைப்புகள். புண்ணியம் பாவம் வேறுபடுத்தி உணர்தல். அன்னதானம், உடை, தானம், மருத்துவ தானம். பாச உணர்வு, மற்றவர்களை மகிழ்ச்சி அடையச் செய்தல். எதையும் உழைக்காமல் பெறுதல். காதல், இன்ப உணர்வுகளை அதிக அளவு நுகர்தல். கற்பனை கலந்த உணர்வுகள்.",
6:"வயிறு, இரைப்பை, கல்லீரல். உடலிலுள்ள எல்லா வித நோய்களும் மற்றும் நோய்க்கிருமிகளையும் குறிக்கும். வழக்கு, கடன், நோய், உணவு. வாடகை, உடல் உழைப்பு. மருந்துகள், மருத்துவர்கள். செல்லப்பிராணிகள், வீட்டு விலங்குகள். வேலைக்காரர்கள், அடிமைகள். ஜாதகருக்கு கட்டுப்படும் நபர்கள். ஜாதகர் வெற்றிகொள்ளும் நபர்கள். உடைகள், அணிகலன்கள். திருமண பந்தம் முறிதல் அல்லது திருமணம் அமையாமல் போகுதல் அல்லது வாழ்க்கைத் துணை மீது ஆதிக்கம் செலுத்துதல். மற்றவரிடம் பணிபுரிதல், மாத சம்பளம், தொழிலாளர்கள். பகைமை, கஞ்சத்தனம், பேராசை, ஆணவம், தற்பெருமை, மற்றவர் பொருளை அபகரித்தல். மற்றவர்களை தோல்வியுறச் செய்து வெற்றி பெறுதல். தாயின் இளைய சகோதரர் (சித்தி அல்லது மாமா). ஒன்றுக்கு மேற்பட்ட சொத்துக்கள், சொத்துக்கள் மூலம் வாடகை. எதையும் மற்றவர்களை விட சிறப்பாக செய்தல். தற்காலிக பணவரவு. சிறைச்சாலை, தனிமையான வாழ்க்கை.",
7:"அடிவயிறு, உடலின் நடுப்பகுதி, தொப்புள், சிறுநீரகம், கற்பப்பை. வாடிக்கையாளர்கள், பொதுஜன தொடர்பு, சமூக அங்கீகாரம். மற்றவர்களுடன் சகஜமாக பழக கூடியவர். இரண்டாவது குழந்தை. பொருளாதார ரீதியில் பழகக்கூடியவர். மற்றவர்களால் ஜாதகர் ஏமாற்றப்படுவதும். துன்பங்களில் இருந்து விடுபடுதல். ஆயுளுக்கு ஆபத்து தரும் மாரக ஸ்தானம் (திடீரென்று இறப்பது). விபத்துகள் நடைபெறாமல் இருத்தல். கணவன் அல்லது மனைவி. இழந்த பொருட்களை மீட்பது. மற்றவர்களுடன் நீண்டநாள் பழக்கவழக்கங்கள். எதிர்பாலின ஸ்பரிசு, சுக பரிமாற்றங்கள். திருமண வாழ்க்கை, வாழ்க்கை துணை பற்றிய விவரங்கள். வியாபாரத்தில் பங்குதாரர்கள். வெளிப்படையான குணம், மற்றவரை இணைத்துக் கொள்ளுதல், மற்றவர்கள் கருத்துக்களுக்கு மதிப்பளித்தல், பிறரை சார்ந்து இருத்தல். சமூகத்திற்கும் சட்டத்திற்கும் கட்டுப்பட்டு இருப்பது.",
8:"ஆயில், வலி, வேதனை, துரோகம், துக்கம். துரதிஷ்டம், விபத்து, உடல் உறுப்புகள் சிதைதல். கொலை, பொருட்கள் திருட்டுப் போகுதல், போராட்டம். கொள்கை, எதிரிகளின் தொல்லை, எல்லாவித தடைகள், வீன் பலி. தெய்வக்குற்றம், தெய்வத்தின் அனுகிரகம் கிடைக்காமல் போவது. சிந்தனை அதர்ம வழியில் செல்வது, அவமானம், கெட்ட பெயர். எதையும் எளிதாக பெற முடியாமல் போவது. போராடியும் கிடைக்காமல் போவது. முயற்சிகள் வீணாக்குதல், திறமைகள் முடக்குதல். கஷ்டப்படுதல், இன்சூரன்ஸ், உயில், வாரிசு, சீதனம், லஞ்சம். இறந்தவரின் பணம், அறுவை சிகிச்சை, சக்திக்கு மீறின பெரும் கடன். ஒரே நேரத்தில் வரும் பலவித நோய்கள், நாட்பட்ட நோய்கள். அதிக வலி வேதனைகளை தரும் நோய்கள். சட்டவிரோதமாக கிடைக்கக்கூடிய பொருட்கள். அதிகப்படியான கோபம். இளமையிலேயே தந்தையை இழத்தல். இயற்கை சீற்றங்கள், போர். எதிர்பாராமல் நடைபெறும் நன்மை மற்றும் தீமையான சம்பவங்கள். கொடிய விலங்குகள், துரோகம், கருப்புப் பணம், மர்ம உறுப்புகளில் பிரச்சனை, விதவை கோலம்.",
9:"தெய்வ நம்பிக்கை, கருணை, மனிதாபிமானம், ஆராய்ச்சித் திறன், உள்ளுணர்வு, உபாசனை, மத நம்பிக்கை, தான தர்மம், தியாக சிந்தனை, அதிர்ஷ்டம், முன்யோசனை. நேர்மை, உயர்கல்வி, தனித்தன்மை, நம்பிக்கை, விசுவாசம். செல்வந்தனாக பிறப்பது, பூர்விகச் சொத்துக்கள் கிடைப்பது, எந்த உழைப்பும் இல்லாமல் கௌரவமாக தொழில் செய்வது (அரசியல், கலை, ஆன்மீகம், அறக்கட்டளை). நிறைய செல்வத்தை தானமாகப் பெறுவது, லாட்டரி, பங்குச் சந்தை. தியானம், குருவிடம் இருந்து உபதேசம் பெறுதல், ஆன்மீகம். தந்தை, தந்தையின் மூதாதையர்கள். பெருந்தன்மை, யோசனை, தூரப்பயணம், தீர்த்த யாத்திரை, கடற்பயணம், விமான பயணம், வெளிநாடு, அண்ணிய நபர்கள். உயர்கல்வி, பல்கலைக்கழகங்கள். இயற்கை, தெய்வ அனுக்கிரகம், கோயில், மசூதி, சர்ச், குலதெய்வம், குரு. உள்நாட்டுச் செய்திகள், வானொலி, தொலைக்காட்சி, ஆவியுலக தொடர்புகள். சட்டம் ஒழுங்கு, நீதித்துறை, நீதிபதி. ஏற்றுமதி, இறக்குமதி, சர்வதேச வர்த்தகம், பரம்பரை சொத்து, முன் பிறவியில் செய்த பாவ புண்ணியம்.",
10:"தொழில் மூலம் கிடைக்கும் பணம், சொத்து, அந்தஸ்து, அதிகாரம். பெரிய பதவி, ஜீவனம். தொழில் ரீதியாக கிடைக்கும் சமூக அந்தஸ்து. நிர்வாகத்திறன், கடமை. பெற்றோருக்கு கர்ம சடங்கு. எதிலும் திருப்தியற்ற மனோநிலை. அரசாங்கம் இடமிருந்து வெகுமதி. வாழ்க்கை துணையின் சொத்து. இளைய சகோதருக்கு ஆபத்து. மூத்த சகோதருக்கு விரையும். சங்க கூட்டத்திற்கு தலைமை தாங்குதல். தத்து குழந்தை. வாழ்க்கைத்துணையின் தாய், மாமியார். குழந்தையின் நோய். எப்போதும் ஒரு பொருளை உற்பத்தி செய்து கொண்டிருத்தல். தொழிற்சாலை, தொழிலதிபர். புகழ், நிரந்தர தொழில், கருமம். உயர் அதிகாரிகள், உலக பந்தங்களில் இருந்து விடுபடுதல். ஒருவருடைய முதல் தொழில். தலைமை பதவி உயர்வு. வணிகம், அரசு சேவை. தொழிலில் சாதனை படைப்பது.",
11:"எளிதில் திருப்தி அடைதல், வெற்றி, மகிழ்ச்சி. நிகர கையிருப்பு பணம், நிகர லாபம். எதிலும் முதலீடு செய்யாமல் பணமாகவே சேமித்து வைத்தல். புரியாத ரகசியங்களை கண்டறிந்து சித்தி பெறுதல். நலம் விரும்பிகள், மருமகன், மருமகள். நீண்டகால நண்பர்கள். ஆலோசகர்கள், ஆசைகள், எடுத்த காரியத்தில் வெற்றி. நோய் குணமாக்குதல். லாபம், அதிஷ்டம், செலவுகள் குறைதல், சேமிப்பு. எல்லாவற்றிலும் தடைகள் இன்றி முன்னேறுதல். ஒருவருக்கு கொடுத்த கடனை பெறுவது. ஆசைகள் நிறைவேறுதல். நீண்டகால நண்பர்கள், அபிலாசைகள். குறிக்கோள், வெற்றிகள். சேமிக்கும் பழக்கவழக்கங்கள். நீடித்த நட்பு, ஒருமித்த கருத்து உடையவர்கள். குழு, சங்கம், கூட்டம், மாநாடு. தந்தை வழி சித்தப்பா. உச்ச நிலை கல்வி, முழு அறிவைப் பெறுதல். ஒரு துறையில் முழுமையாக பயின்று டாக்டர் பட்டம் பெறுதல். புத்தி கூர்மை, பாராளுமன்றம், சட்டமன்றம், நகராட்சிகள். வியாதி குணமடைதல், மருத்துவமனையிலிருந்து வீடு திரும்புதல், உற்சாகம், உடல் எதையும் எதிர்கொள்ளும் ஆற்றல். உடலில் தாங்கும் சக்தி, உடலுறுதி.",
12:"அனைத்து செயல்பாடுகளை முடிவுக்குக் கொண்டுவரும் மோட்ச ஸ்தானம். பாதங்கள். உடலில் இருந்து வெளியேறும் கழிவுப் பொருட்கள். ரகசிய சதி வேலைகள், ரகசிய திட்டங்கள், சதி ஆலோசனைகள். ரகசிய எதிரிகள், அரசியல் கொலைகள். புரியாத புதிர்கள், மறைமுகமாக இருக்கும் விஷயங்கள். துப்பறியும் வேலைகள், ரகசிய முதலீடுகள். உடல் உறுப்பு மற்றும் மூளை செயலிழந்து போகுதல். தாழ்வு மனப்பானமை, தனிமையில் இருத்தல். தோல்வி, மறைந்து வாழ்தல். சமூக கட்டுப்பாடுகளால் தள்ளி வைக்கப்படுதல். சிறைச்சாலைகள், அனாதை விடுதிகள். எல்லாவித தடைகள், நஷ்டங்கள், வரவுக்கு மீறிய செலவுகள். அதிகமான வட்டியுடன் கூடிய கடனை திருப்பி செலுத்துதல். மறைமுக எதிரிகளை சமாளிக்க முடியாமல் திணறுதல். மருத்துவமனையில் தங்கி சிகிச்சை பெறுதல். எல்லா விதமான தண்டனைகள், அபராதங்கள். துறவு, இடமாற்றம், வெளிநாடு செல்லுதல். முற்றிலும் புதிய சூழ்நிலையில் வாழ்தல். வெளிநாட்டில் குடியுரிமை பெறுதல். பணத்தை சொத்துக்களில் முதலீடு செய்தல். தன் வேலையை மற்றவரிடம் தந்து விட்டு நிம்மதியாக இருத்தல். இரண்டாவது தொழில் செய்தல். எல்லா வேலைகளையும் முடித்து படுக்கைக்குச் செல்லுதல், உறக்கம். புதியவற்றைக் கண்டுபிடித்தல். ரகசிய நபர்கள் தொடர்புகள். மோட்சம், பக்கவாதம், விரயங்கள். சிபி, சிஐடி, ஒற்றர்கள், சிறையில் இருத்தல், உறுப்புகள் துண்டித்தல், ஊரை விட்டு துரத்துதல்."
};

// Get bhava detail for relevant houses based on topic's promise houses
function getBhavaDetailCtx(promiseHouses, isTA) {
  if (!promiseHouses || !promiseHouses.length) return "";
  var lines = [isTA ? "சம்பந்தப்பட்ட பாவ காரகங்கள்:" : "Relevant Bhava Karakathuvam:"];
  promiseHouses.forEach(function(h) {
    if (BHAVA_DETAIL_TA[h]) {
      lines.push("House " + h + ": " + BHAVA_DETAIL_TA[h]);
    }
  });
  return lines.join("\n");
}

const KP249 = (function() {
  var out = []; var num = 1;

    var subs = SUBLORDS[ni];
    for (var si = 0; si < subs.length; si++) {
      if (num > 249) break;
      var a0 = ni*800 + subs[si].s;

function getKP(sid) {
  var d = norm(sid);
  var ri = Math.floor(d/30)%12;
  var tot = d*60;
  var ni = Math.min(Math.floor(tot/800), 26);
  var mn = tot - ni*800;
  var subs = SUBLORDS[ni];
  var si = subs.length-1;
  for (var k = 0; k < subs.length; k++) { if (mn < subs[k].e - 1e-6) { si = k; break; } }
  return { ri:ri, ni:ni, sl:RS_LORD[ri], nl:NK[ni][2], subl:subs[si].p };
}

function fmtAbs(d) {

  var inSign = dd % 30;
  var D = Math.floor(inSign), rem = (inSign-D)*60, M = Math.floor(rem), S = Math.round((rem-M)*60);
  if(S===60){S=0;M++;} if(M===60){M=0;D++;}
  return String(D).padStart(2,'0')+" "+String(M).padStart(2,'0')+"'"+String(S).padStart(2,'0')+'"';
}

function getPlanetStatus(p, sunSidDeg) {
  var pl = p.pl;
  var status = [];
  if (pl === 7 || pl === 8 || p.retro)
    status.push({ code:"(R)", label:"Retrograde", color:"#ff9900", labelTA:"(வ)", codeTA:"(வ)" });
  if (pl > 6) return status;
  var ri = p.ri;
  var deg = p.sidDeg % 30;
  if (ri === EXALT_RASI[pl]) {
    status.push({ code:"E", label:"Exaltation", color:"#44ff88", labelTA:"(உ)", codeTA:"(உ)" });
  } else if (ri === DEBIL_RASI[pl]) {
    status.push({ code:"D", label:"Debilitation", color:"#ff5555", labelTA:"(நீ)", codeTA:"(நீ)" });
  }
  if (pl >= 2 && pl <= 6 && sunSidDeg !== undefined) {
    var orb = COMBUST_ORB[pl];
    if (p.retro && pl === 3) orb = 12;
    if (p.retro && pl === 5) orb = 8;
    var diff3 = Math.abs(p.sidDeg - sunSidDeg);
    if (diff3 > 180) diff3 = 360 - diff3;
    if (diff3 <= orb)
      status.push({ code:"C", label:"Combust", color:"#ff6600", labelTA:"(அ)", codeTA:"(அ)" });
  }
  return status;
}

var MOVABLE_SIGNS = [0,3,6,9];
var FIXED_SIGNS   = [1,4,7,10];
var DUAL_SIGNS    = [2,5,8,11];

function isVargottama(sidDeg) {
  var ri     = Math.floor(sidDeg / 30) % 12;
  var inSign = sidDeg % 30;
  if (MOVABLE_SIGNS.indexOf(ri) !== -1) return inSign < 3.333;        // 0-3°20'
  if (FIXED_SIGNS.indexOf(ri)   !== -1) return inSign >= 13.333 && inSign < 16.667; // 13°20'-16°40'
  if (DUAL_SIGNS.indexOf(ri)    !== -1) return inSign >= 26.667;      // 26°40'-30°00'
  return false;
}

// ── Pushkara Navamsa ──────────────────────────────────────────────────────────
// Based on Nakshatra + Pada rule (traditional South Indian method):
//
// Nakshatra index (0-26), Pada (1-4):
// Krittika(2),Uttara Phalguni(11),Uttara Ashadha(20) = Pada 1 & 4
// Punarvasu(6),Vishakha(15),Purva Bhadrapada(24)     = Pada 2 & 4
// Pushya(7),Anuradha(16),Uttara Bhadrapada(25)       = Pada 2
// Rohini(3),Hasta(12),Shravana(21)                   = Pada 2
// Bharani(1),Purva Phalguni(10),Purva Ashadha(19)    = Pada 3
// Ardra(5),Swati(14),Shatabhisha(23)                 = Pada 4
//
// All other nakshatras have NO Pushkara Navamsa pada.

var PUSHKARA_PADA = {
  2:  [1,4],  // Krittika
  11: [1,4],  // Uttara Phalguni
  20: [1,4],  // Uttara Ashadha
  6:  [2,4],  // Punarvasu
  15: [2,4],  // Vishakha
  24: [2,4],  // Purva Bhadrapada
  7:  [2],    // Pushya
  16: [2],    // Anuradha
  25: [2],    // Uttara Bhadrapada
  3:  [2],    // Rohini
  12: [2],    // Hasta
  21: [2],    // Shravana
  1:  [3],    // Bharani
  10: [3],    // Purva Phalguni
  19: [3],    // Purva Ashadha
  5:  [4],    // Ardra
  14: [4],    // Swati
  23: [4]     // Shatabhisha
};

function isPushkaramsa(sidDeg) {
  var ni   = Math.min(Math.floor(sidDeg * 60 / 800), 26); // nakshatra index 0-26
  var inNk = (sidDeg * 60) - ni * 800;                    // minutes within nakshatra
  var pada = Math.min(Math.floor(inNk / 200) + 1, 4);     // pada 1-4
  var pk   = PUSHKARA_PADA[ni];
  return pk ? pk.indexOf(pada) !== -1 : false;
}

function getSpecialFlags(sidDeg) {
  var flags = [];
  if (isVargottama(sidDeg))  flags.push({ code:"VG", label:"Vargottama", labelTA:"வர்கோத்தம", color:"#00ccff" });
  if (isPushkaramsa(sidDeg)) flags.push({ code:"PK", label:"Pushkaramsa", labelTA:"புஷ்கராம்சம்", color:"#ffcc00" });
  return flags;
}

function SpecialFlagBadges(props) {

          borderRadius:"2px", padding:"0 3px", lineHeight:"1.4" } }, f.code);
    })

}

function calcPanchang(sunSid, moonSid) {
  var td = norm(moonSid-sunSid), tn = Math.floor(td/12)+1;
  var TN_EN = ["Prathama","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima/Amavasya"];
  var TN_TA = ["பிரதமை","துவிதியை","திருதியை","சதுர்த்தி","பஞ்சமி","சஷ்டி","சப்தமி","அஷ்டமி","நவமி","தசமி","ஏகாதசி","துவாதசி","திரயோதசி","சதுர்தசி","பௌர்ணமி/அமாவாசை"];
  var YN_EN = ["Vishkambha","Priti","Ayushman","Saubhagya","Shobhana","Atiganda","Sukarman","Dhriti","Shula","Ganda","Vriddhi","Dhruva","Vyaghata","Harshana","Vajra","Siddhi","Vyatipata","Variyan","Parigha","Shiva","Siddha","Sadhya","Shubha","Shukla","Brahma","Indra","Vaidhriti"];
  var YN_TA = ["விஷ்கம்ப","பிரீதி","ஆயுஷ்மான்","சௌபாக்கிய","சோபன","அதிகண்ட","சுகர்மன்","திருதி","சூல","கண்ட","விருத்தி","துருவ","வியாகாத","ஹர்ஷண","வஜ்ர","சித்தி","வியதிபாத","வரியான்","பரிக","சிவ","சித்த","சாத்ய","சுப","சுக்ல","பிரம்ம","இந்திர","வைத்ருதி"];
  // 11 Karanas: 7 Chara (repeating) + 4 Sthira (fixed, last 4 of Krishna paksha)
  // Index: 0=Bava..6=Vishti (chara), 7=Shakuni,8=Chatushpada,9=Naga,10=Kimstughna (sthira)
  // Sequence: k=0-55 → chara repeating (k%7), k=56→Shakuni, k=57→Chatushpada, k=58→Naga, k=59→Kimstughna
  var KN_EN = ["Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti","Shakuni","Chatushpada","Naga","Kimstughna"];
  var KN_TA = ["பவ","பாலவ","கௌலவ","தைதில","கரஜ","வணிஜ","விஷ்டி","சகுனி","சதுஷ்பாத","நாக","கிம்ஸ்துக்ன"];
  var KN_TYPE_EN = ["Chara","Chara","Chara","Chara","Chara","Chara","Chara","Sthira","Sthira","Sthira","Sthira"];
  var KN_TYPE_TA = ["சர","சர","சர","சர","சர","சர","சர","ஸ்திர","ஸ்திர","ஸ்திர","ஸ்திர"];
  var ni = Math.min(Math.floor(moonSid*60/800), 26);
  var pada = Math.floor((moonSid*60/800-ni)*4)+1;
  var yogaIdx = Math.floor(norm(sunSid+moonSid)/(360/27));
  var toT = function(h) {
    var hh=Math.floor(h), mm=Math.floor((h-hh)*60), ss=Math.round(((h-hh)*60-mm)*60);
    return String(hh).padStart(2,'0')+":"+String(mm).padStart(2,'0')+":"+String(ss).padStart(2,'0');
  };
  var yogi = calcYogiPlanet(sunSid, moonSid);
  return {
    tithiNum: tn,
    paksha_en: td<180 ? "Shukla Paksha" : "Krishna Paksha",
    paksha_ta: td<180 ? "சுக்ல பக்ஷம்" : "கிருஷ்ண பக்ஷம்",
    tithi_en:  TN_EN[Math.min(tn-1,14)],
    tithi_ta:  TN_TA[Math.min(tn-1,14)],
    nakshatra_en: NK[ni][1], nakshatra_ta: NK[ni][0], nakshatraPada: pada,
    yoga_en: YN_EN[yogaIdx%27], yoga_ta: YN_TA[yogaIdx%27],
    karana_en: (function(){ var k=Math.floor(td/6)%60; var i=k===0?10:(k<=56?(k-1)%7:(k===57)?7:(k===58)?8:9); return KN_EN[i]; })(),
    karana_ta: (function(){ var k=Math.floor(td/6)%60; var i=k===0?10:(k<=56?(k-1)%7:(k===57)?7:(k===58)?8:9); return KN_TA[i]; })(),
    karana_type_en: (function(){ var k=Math.floor(td/6)%60; var i=k===0?10:(k<=56?(k-1)%7:(k===57)?7:(k===58)?8:9); return KN_TYPE_EN[i]; })(),
    karana_type_ta: (function(){ var k=Math.floor(td/6)%60; var i=k===0?10:(k<=56?(k-1)%7:(k===57)?7:(k===58)?8:9); return KN_TYPE_TA[i]; })(),
    sunrise: toT(6.0), sunset: toT(18.0),
    yogiPl: yogi.yogiPl, dupYogiPl: yogi.dupYogiPl, avayogiPl: yogi.avayogiPl,
    yogiPoint: yogi.yogiPoint
  };
}

function calcDasaBalance(moonPos) {
  var ni = moonPos.ni;
  var mn = moonPos.sidDeg*60 - ni*800;
  var frac = 1 - mn/800;
  var yrs = DASA[NK[ni][2]] * frac;
  var y = Math.floor(yrs), mRem = (yrs-y)*12, m = Math.floor(mRem), d = Math.round((mRem-m)*30);
  return { planet: NK[ni][2], years:y, months:m, days:d };
}

function calcSignificators(positions, lagna) {
  var kpPositions = positions.filter(function(p){ return p.pl <= 8; });
  var plHouse = {};
  kpPositions.forEach(function(p) {
    plHouse[p.pl] = ((p.ri - lagna.ri + 12) % 12) + 1;
  });
  return kpPositions.map(function(p) {
    var hp   = ((p.ri - lagna.ri + 12) % 12) + 1;
    var nlHp = plHouse[p.nl] !== undefined ? [plHouse[p.nl]] : [];
    var owned = RS_LORD.map(function(l,i) { return l===p.pl ? ((i-lagna.ri+12)%12)+1 : null; }).filter(Boolean);
    var nlH   = RS_LORD.map(function(l,i) { return l===p.nl ? ((i-lagna.ri+12)%12)+1 : null; }).filter(Boolean);
    var all   = Array.from(new Set(nlHp.concat([hp]).concat(owned).concat(nlH))).sort(function(a,b){return a-b;});
    return { pl:p.pl, hp:hp, nlHp:nlHp, owned:owned, nlH:nlH, all:all };
  });
}

// ── Mandi (Maandi / Gulika) calculation ─────────────────────────────────────
// Classical Tamil formula using Nazhika counts (Image ref: Scribd doc 840020836)
// 1 Nazhika = dayDur/30 (day) or nightDur/30 (night) — proportional Vedic time unit
// Day nazhika offsets from SUNRISE:  Su=26,Mo=22,Tu=18,We=14,Th=10,Fr=6, Sa=2
// Night nazhika offsets from SUNSET: Su=10,Mo=6, Tu=2, We=26,Th=22,Fr=18,Sa=14
// Mandi time = sunrise + (day_naz/30)*dayDur   [for day births]
//            = sunset  + (nite_naz/30)*nightDur [for night births]
// The Lagna (ascendant) at that moment = Mandi rasi
function calcMandi(yr, mo, dy, utHr, lat, lon, ayan) {
  // Compute sunrise and sunset using solar declination
  var jdNoon = julianDay(yr, mo, dy, 12.0 - lon/15.0);
  var Tn = (jdNoon - 2451545.0) / 36525.0;
  var sunLon = calcSun(Tn);
  var obliq = (23.439291111 - 0.013004167 * Tn) * Math.PI / 180;
  var decl = Math.asin(Math.sin(obliq) * Math.sin(sunLon * Math.PI / 180));
  var cosH = -Math.tan(lat * Math.PI / 180) * Math.tan(decl);
  cosH = Math.max(-1, Math.min(1, cosH));
  var H = Math.acos(cosH) * 180 / Math.PI / 15;
  var sunriseUt = 12.0 - lon/15.0 - H;
  var sunsetUt  = 12.0 - lon/15.0 + H;
  var dayDur    = sunsetUt - sunriseUt;
  var niteDur   = 24.0 - dayDur;
  var isDay     = (utHr >= sunriseUt && utHr < sunsetUt);
  // Nazhika counts by weekday (0=Sun..6=Sat)
  var DAY_NAZ  = [26, 22, 18, 14, 10,  6,  2]; // from sunrise
  var NITE_NAZ = [10,  6,  2, 26, 22, 18, 14]; // from sunset
  var dayOfWeek = (new Date(yr, mo-1, dy)).getDay();
  var mandiTimeUt;
  if (isDay) {
    mandiTimeUt = sunriseUt + (DAY_NAZ[dayOfWeek] / 30.0) * dayDur;
  } else {
    mandiTimeUt = sunsetUt  + (NITE_NAZ[dayOfWeek] / 30.0) * niteDur;
  }
  // Mandi time may cross midnight — compute JD accordingly
  var mandiDy = dy, mandiUt = mandiTimeUt;
  if (mandiUt >= 24.0) { mandiUt -= 24.0; mandiDy += 1; }
  var jdMandi = julianDay(yr, mo, mandiDy, mandiUt);
  var Tm = (jdMandi - 2451545.0) / 36525.0;
  var ayanM = lahiriAyanamsa(Tm);
  var mandiLagna = calcAscendant(jdMandi, Tm, lat, lon, ayanM);
  return { sidDeg: mandiLagna.sidDeg, ri: mandiLagna.ri,
           sl: mandiLagna.sl, nl: mandiLagna.nl, subl: mandiLagna.subl };
}

function calcAll(yr, mo, dy, utHr, lat, lon) {
  var jd = julianDay(yr,mo,dy,utHr);
  var T  = (jd-2451545.0)/36525.0;
  var ayan = lahiriAyanamsa(T);
  var earth   = earthHelio(T);
  var mercury = planetHelio(0.38709927,0.20563593, 0.00001906,252.25032350,149472.67411175, 77.45779628, 0.16047689,T);
  var venus   = planetHelio(0.72333566,0.00677672,-0.00004107,181.97909950, 58517.81538729,131.60246718, 0.00268329,T);
  var mars    = planetHelio(1.52371034,0.09339410, 0.00007882,355.44656122, 19140.30268499,336.05637041, 0.44441088,T);
  var jupiter = planetHelio(5.20288700,0.04838624,-0.00013253, 34.39644051,  3034.74612775, 14.72847983, 0.21252668,T);
  var saturn  = planetHelio(9.53667594,0.05386179,-0.00050991, 49.95424423, 1222.49514316, 92.59887831,-0.41897216,T);
  var sunTrop  = calcSun(T);
  var moonTrop = calcMoonApparent(T);
  var rahuTrop = calcRahu(T);
  var ketuTrop = norm(rahuTrop+180);
  var uranus  = calcUranus(T);
  var neptune = calcNeptune(T);
  var pluto   = calcPluto(T);
  var trops = [
    sunTrop, moonTrop,
    geoLon(mars.x,mars.y,earth.x,earth.y),
    geoLon(mercury.x,mercury.y,earth.x,earth.y),
    geoLon(jupiter.x,jupiter.y,earth.x,earth.y),
    geoLon(venus.x,venus.y,earth.x,earth.y),
    geoLon(saturn.x,saturn.y,earth.x,earth.y),
    rahuTrop, ketuTrop,
    geoLon(uranus.x,uranus.y,earth.x,earth.y),
    geoLon(neptune.x,neptune.y,earth.x,earth.y),
    geoLon(pluto.x,pluto.y,earth.x,earth.y)
  ];
  // Retrograde detection for birth chart (next-day positions)
  var T1b = T + 1/36525;
  var earth1b   = earthHelio(T1b);
  var mercury1b = planetHelio(0.38709927,0.20563593, 0.00001906,252.25032350,149472.67411175, 77.45779628, 0.16047689,T1b);
  var venus1b   = planetHelio(0.72333566,0.00677672,-0.00004107,181.97909950, 58517.81538729,131.60246718, 0.00268329,T1b);

function calcKPLookup(n, gocharaData) {
  // KP number sets the lagna degree
  // Lagna from KP number; planets + cusps + everything else from gocharaData (Gochara)
  var entry = KP249[n-1];
  if (!entry) return null;
  var lagDeg = entry.d0;
  var lagKP  = getKP(lagDeg);
  var lagna  = { tropDeg:lagDeg, sidDeg:lagDeg, ri:Math.floor(lagDeg/30)%12,
                 sl:lagKP.sl, nl:lagKP.nl, subl:lagKP.subl };

  // Planets from Gochara - unchanged
  var positions = gocharaData ? gocharaData.positions : [];
  // Build exactly 12 cusps in KP lagna order (House I = KP lagna rasi, going around)
  // For each house, find the matching Gochara cusp by rasi; fallback to equal house
  var lagRi = Math.floor(lagDeg/30)%12;
  var rawCusps = gocharaData ? gocharaData.cusps : [];
  // Build a map: rasi -> gochara cusp
  var goCuspByRasi = {};
  rawCusps.forEach(function(c){ goCuspByRasi[c.ri] = c; });
  var cusps = [];
  for (var hi = 0; hi < 12; hi++) {
    var houseRi = (lagRi + hi) % 12;
    var houseNum = hi + 1;
    if (hi === 0) {
      // House I always = KP number lagna degree
      cusps.push({ house:houseNum, d:lagDeg, sidDeg:lagDeg, ri:lagRi,
                   sl:lagKP.sl, nl:lagKP.nl, subl:lagKP.subl });
    } else if (goCuspByRasi[houseRi]) {
      // Use Gochara cusp for this rasi, relabelled with KP house number
      var gc = goCuspByRasi[houseRi];
      cusps.push(Object.assign({}, gc, { house:houseNum }));
    } else {
      // Fallback: equal house from KP lagna
      var eqDeg = (lagDeg + hi*30) % 360;
      var eqKP  = getKP(eqDeg);
      cusps.push({ house:houseNum, d:eqDeg, sidDeg:eqDeg, ri:houseRi,
                   sl:eqKP.sl, nl:eqKP.nl, subl:eqKP.subl });
    }
  }

  var moonDeg = positions.length > 0 ? positions[1].sidDeg : lagDeg;
  var sunDeg  = positions.length > 0 ? positions[0].sidDeg : lagDeg;
  var panchang    = calcPanchang(sunDeg, moonDeg);
  var dasaBalance = positions.length > 0
    ? calcDasaBalance(positions[1])
    : { planet:lagKP.nl, years:0, months:0, days:0 };
  var significators = calcSignificators(positions, lagna);
  var ruling = gocharaData ? Object.assign({}, gocharaData.ruling, {
    lagnaSignLord:lagna.sl, lagnaStarLord:lagna.nl, lagnaSubLord:lagna.subl
  }) : {
    dayLord:0, lagnaSignLord:lagna.sl, lagnaStarLord:lagna.nl, lagnaSubLord:lagna.subl,
    moonSignLord:lagna.sl, moonStarLord:lagna.nl, moonSubLord:lagna.subl
  };
  var inp = gocharaData
    ? Object.assign({}, gocharaData.input, {name:"KP #"+n})
    : { name:"KP #"+n, day:1, month:1, year:2000, hour:0, minute:0, second:0,
        lat:0, lon:0, place:"KP Number "+n, gender:"male" };

  return {
    positions:positions, lagna:lagna, cusps:cusps, panchang:panchang,
    dasaBalance:dasaBalance, significators:significators, ruling:ruling,
    T:    gocharaData ? gocharaData.T    : 0,
    ayan: gocharaData ? gocharaData.ayan : 0,
    input:inp, mode:"kp249", kpNum:n, kpEntry:entry
  };
}

function GocharaStarPadaTable(props) {
  var positions = props.positions;

  var isTA      = props.isTA;
  var sh  = function(i){ return isTA ? PL_STA[i] : PL_SEN[i]; };
  var pN  = function(i){ return isTA ? PL_TA[i]  : PL_EN[i];  };
  var rN  = function(i){ return isTA ? RS_TA[i]   : RS_EN[i];  };
  var nN  = function(i){ return isTA ? NK[i][0]   : NK[i][1];  };

  var rows = [];
  // Lagna row
  var lagPada = getPada(lagna.sidDeg);
  var lagNi   = Math.min(Math.floor(lagna.sidDeg * 60 / 800), 26);
  var lagNavRi = getNavamsaRasi(lagna.sidDeg);
  rows.push({ label: isTA?"லக்னம்":"Lagna", color:"#44ff88",
    rasi: rN(lagna.ri), star: nN(lagNi), pada: lagPada,
    navRasi: rN(lagNavRi), sl: sh(lagna.sl), nl: sh(lagna.nl), subl: sh(lagna.subl),
    vg: isVargottama(lagna.sidDeg) });

  // Planet rows (0–8, skip Ketu as it's 180 from Rahu)
  positions.slice(0, 9).forEach(function(p, i) {
    var pada   = getPada(p.sidDeg);
    var navRi  = getNavamsaRasi(p.sidDeg);
    rows.push({ label: pN(i), color: plClr(i),
      rasi: rN(p.ri), star: nN(p.ni), pada: pada,
      navRasi: rN(navRi), sl: sh(p.sl), nl: sh(p.nl), subl: sh(p.subl),
      vg: isVargottama(p.sidDeg) });
  });

  var hdStyle = { background:C.bg3, color:C.acc, padding:"6px 8px",
    textAlign:"left", fontSize:"10px", letterSpacing:".5px",
    textTransform:"uppercase", whiteSpace:"nowrap", borderBottom:"1px solid "+C.bdr };

      textTransform:"uppercase",marginBottom:"8px",paddingBottom:"5px",borderBottom:"1px solid "+C.bdrGold}},

        ce("thead",null,
          ce("tr",null,
            ce("th",{style:hdStyle}, isTA?"கிரகம்":"Planet"),

          )
        ),
        ce("tbody",null,
          rows.map(function(row, idx) {
            var bg = idx % 2 === 0 ? C.bg2 : C.bg4;
            var tdS = { padding:"7px 8px", background:bg, borderBottom:"1px solid "+C.bdr };
            var tdC = Object.assign({},tdS,{textAlign:"center"});
            return ce("tr",{key:idx},

function LocationSearch(props) {
  var lang = props.lang;
  var onSelect = props.onSelect;
  var _a = useState(""), val = _a[0], setVal = _a[1];
  var _b = useState([]), sugg = _b[0], setSugg = _b[1];
  var _c = useState(false), open = _c[0], setOpen = _c[1];
  var ref = useRef(null);

  useEffect(function() {
    function h(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", h);
    return function() { document.removeEventListener("mousedown", h); };
  }, []);

  function search(v) {
    setVal(v);
    if (!v || v.length < 1) { setSugg([]); setOpen(false); return; }
    var q = v.toLowerCase().trim();
    var results = [];
    for (var i = 0; i < CITY_DB.length && results.length < 10; i++) {
      var city = CITY_DB[i];
      if (city[0].toLowerCase().indexOf(q) === 0) {
        results.push({ city: city[0], region: city[1], lat: city[2].toFixed(4), lon: city[3].toFixed(4), pri: 0 });
      }
    }
    if (results.length < 5) {
      for (var j = 0; j < CITY_DB.length && results.length < 10; j++) {
        var c2 = CITY_DB[j];
        if (c2[0].toLowerCase().indexOf(q) > 0) {
          results.push({ city: c2[0], region: c2[1], lat: c2[2].toFixed(4), lon: c2[3].toFixed(4), pri: 1 });
        }
      }
    }
    setSugg(results);
    setOpen(results.length > 0);
  }

  function pick(item) {
    var lbl = item.city + ", " + item.region;
    setVal(lbl); setSugg([]); setOpen(false);
    onSelect(item.lat, item.lon, lbl);
  }

  var isTA = lang === "ta";
  return ce("div", { ref: ref, style: { position: "relative" } },
    ce("input", {
      value: val,
      onChange: function(e) { search(e.target.value); },
      placeholder: isTA ? "நகரம் தட்டச்சு... (Chennai, Madurai, Mumbai...)" : "Type city name... (Chennai, Madurai, Mumbai, London...)",
      style: S.inp
    }),
    open && ce("div", {
      style: { position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: C.bg3, border: "1px solid "+C.acc, borderRadius: "8px", zIndex: 500, maxHeight: "280px", overflowY: "auto", boxShadow: "0 10px 30px rgba(0,0,0,.9)" }
    },
      sugg.map(function(item, i) {
        return ce("div", {
          key: i,
          onClick: function() { pick(item); },
          style: { padding: "10px 14px", cursor: "pointer", borderBottom: "1px solid "+C.bdr }
        },
          ce("div", { style: { fontWeight: 700, color: C.acc2, fontSize: "13px" } }, item.city),
          ce("div", { style: { fontSize: "11px", marginTop: "2px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
            ce("span", { style: { color: "#7a7a9a" } }, item.region),
            ce("span", { style: { color: "#44cc88", fontFamily: "monospace", fontSize: "10px", background: C.bg1, padding: "2px 6px", borderRadius: "4px" } },
              item.lat + " N  " + item.lon + " E"
            )
          )
        );
      })
    )
  );
}

var GOCHARA_STABS_EN = ["Basic Info","KP Chart + Star","Chara Karaka"];
var GOCHARA_STABS_TA = ["அடிப்படை","KP கட்டம் + நட்சத்திரம்","சர காரகன்"];

function ChartOutput(props) {
  useTheme();
  var data = props.data;
  var lang = props.lang;
  var deductCoins = props.deductCoins || function(){ return true; };
  var isKP249   = data.mode === "kp249";
  var isGochara = data.mode === "gochara";
  var _s = useState("basic"), stab = _s[0], setStab = _s[1];
  // Reset to default tab whenever the chart mode changes
  useEffect(function() {
    setStab("basic");
  }, [data.mode]);
  // Chart style: "south" (default) | "north"
  var _cs = useState("south"), chartStyle = _cs[0], setChartStyle = _cs[1];
  // Show Uranus/Neptune/Pluto toggle
  var _unp = useState(true), showUNP = _unp[0], setShowUNP = _unp[1];
  var _exp = useState({}), dasaExpanded = _exp[0], setDasaExpanded = _exp[1];  // TOP LEVEL - not inside conditional
  var _sq = useState(null), selQuery = _sq[0], setSelQuery = _sq[1];
  var _cqt = useState(""), commonTopic = _cqt[0], setCommonTopic = _cqt[1];
  var _pTopic = useState("marriage"), pTopic = _pTopic[0], setPTopic = _pTopic[1];
  var isTA = lang === "ta";
  var positions = data.positions, lagna = data.lagna, cusps = data.cusps;
  var panchang = data.panchang, dasaBalance = data.dasaBalance;
  var ruling = data.ruling, significators = data.significators, input = data.input;
  // Mandi — compute on-the-fly if not present (older charts before mandi was added)
  var mandi = data.mandi || (function(){
    try {
      if (!input) return null;
      var jd0 = julianDay(input.year, input.month, input.day, input.utHr);
      var T0  = (jd0 - 2451545.0) / 36525.0;
      return calcMandi(input.year, input.month, input.day, input.utHr, input.lat, input.lon, lahiriAyanamsa(T0));
    } catch(e) { return null; }
  })();
  var sh = function(i) { return isTA ? PL_STA[i] : PL_SEN[i]; };
  var pN = function(i) { return isTA ? PL_TA[i] : PL_EN[i]; };
  var rN = function(i) { return isTA ? RS_TA[i] : RS_EN[i]; };
  var nN = function(i) { return isTA ? NK[i][0] : NK[i][1]; };
  var nc_en = "SL-Sign Lord | NL-Star Lord | SubL-Sub Lord";
  var nc_ta = "ரா-ராசி அதிபதி | ந-நட்சத்திர அதிபதி | உ-உப நட்சத்திர அதிபதி";

  var sunSidDeg = positions && positions[0] ? positions[0].sidDeg : undefined;

  function plRow(p, isLag) {
    return [
      { val: isLag ? (isTA?"லக்":"Lag") : (isTA?PL_TA[p.pl]:PL_EN[p.pl]), s:{ color: isLag?(C._dark?"#44ff88":"#1a8844"):plClr(p.pl), fontWeight:700 } },
      rN(p.ri),
      { val: fmtAbs(p.sidDeg), s:{ fontFamily:"monospace", fontSize:"12px", color:C.acc2 } },
      { val: sh(p.sl), s:{ color:"#4488ee" } },
      { val: sh(p.nl), s:{ color:"#44cc88" } },
      { val: sh(p.subl), s:{ color:"#ffaa44" } }
    ];
  }

  function printChart() {
    var inp = input;
    var pos = positions;
    var pN2 = function(i){ return i===null||i===undefined?"-":(isTA?PL_TA[i]:PL_EN[i]); };
    var rN2 = function(i){ return isTA?RS_TA[i]:RS_EN[i]; };
    var nN2 = function(i){ return isTA?NK[i][0]:NK[i][1]; };
    var sh2 = function(i){ return i===null||i===undefined?"-":(isTA?PL_STA[i]:PL_SEN[i]); };
    var dateStr = String(inp.day).padStart(2,'0')+"/"+String(inp.month).padStart(2,'0')+"/"+inp.year;
    var timeStr = String(inp.hour).padStart(2,'0')+":"+String(inp.minute).padStart(2,'0')+":"+String(inp.second||0).padStart(2,'0')+" IST";

    // ── CSS ──
    var css = '*{box-sizing:border-box;margin:0;padding:0;}'+
      'body{font-family:Arial,sans-serif;font-size:11px;color:#111;background:#fff;padding:16px;}'+
      'h1{font-size:17px;color:#8B6914;border-bottom:2px solid #8B6914;padding-bottom:5px;margin-bottom:12px;}'+
      'h2{font-size:13px;color:#5a4010;margin:18px 0 6px;border-bottom:1px solid #d0c890;padding-bottom:3px;page-break-after:avoid;}'+
      'h3{font-size:11px;color:#888;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.5px;}'+
      '.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;}'+
      '.info-box{background:#fafaf5;border:1px solid #e0d8c0;border-radius:3px;padding:6px 8px;}'+
      '.info-box label{font-size:9px;color:#888;display:block;margin-bottom:1px;text-transform:uppercase;letter-spacing:.5px;}'+
      '.info-box span{font-weight:700;color:#333;font-size:11px;}'+
      'table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px;}'+
      'th{background:#f0e8d0;color:#5a4010;padding:4px 6px;text-align:left;font-size:9px;border:1px solid #d0c890;}'+
      'td{padding:3px 6px;border:1px solid #e8e0c8;vertical-align:top;}'+
      'tr:nth-child(even) td{background:#fafaf5;}'+
      '.chart-table{border-collapse:collapse;width:260px;margin:0 auto 12px;}'+
      '.chart-table td{border:2px solid #8B6914;width:65px;height:65px;vertical-align:top;padding:3px;font-size:10px;}'+
      '.chart-table .cc{background:#fdf8ec;text-align:center;vertical-align:middle;border:2px solid #8B6914;font-size:10px;}'+
      '.section{page-break-before:always;}'+
      '.section:first-child{page-break-before:auto;}'+
      '.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}'+
      '.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin:1px;}'+
      '.footer{font-size:8px;color:#aaa;margin-top:14px;border-top:1px solid #eee;padding-top:5px;text-align:center;}'+
      '.no-print{margin-bottom:12px;}'+
      '@media print{.no-print{display:none!important;}body{padding:8px;}@page{margin:1cm;size:A4;}}';

    // ── South Indian chart grid ──
    function buildGrid(posArr, lagnaObj, cuspsArr, titleName, titleDate) {
      var FLAT=[11,0,1,2,10,-1,-1,3,9,-1,-1,4,8,7,6,5];
      var pm={};
      if(lagnaObj){if(!pm[lagnaObj.ri])pm[lagnaObj.ri]=[];pm[lagnaObj.ri].unshift("<b style='color:#006600'>"+(isTA?"லக்":"Lag")+"</b>");}
      posArr&&posArr.slice(0,9).forEach(function(p){if(!pm[p.ri])pm[p.ri]=[];pm[p.ri].push("<b>"+sh2(p.pl)+"</b>");});
      if(data.mandi&&data.mandi.ri!==undefined){var mr=data.mandi.ri;if(!pm[mr])pm[mr]=[];pm[mr].push("<span style='color:#993377'>"+(isTA?"மாந்":"Mnd")+"</span>");}
      var cm={};
      cuspsArr&&cuspsArr.forEach(function(cc){if(!cm[cc.ri])cm[cc.ri]=[];cm[cc.ri].push(cc.house);});
      var cells="";
      for(var r=0;r<4;r++){
        cells+="<tr>";
        for(var c=0;c<4;c++){
          var ri=FLAT[r*4+c];
          if(ri===-1){if(r===1&&c===1){cells+="<td colspan='2' rowspan='2' class='cc'><b style='font-size:11px'>"+(titleName||"")+"</b><br/><span style='font-size:9px;color:#888'>"+(titleDate||"")+"</span></td>";}continue;}
          var pls=(pm[ri]||[]).join(" ");
          var hns=(cm[ri]||[]).map(function(h){return "<span style='font-size:8px;color:#555'>"+h+"</span>";}).join(" ");
          var rSh=isTA?RS_TA[ri].substring(0,3):RS_SH[ri];
          cells+="<td style='vertical-align:top;'><span style='font-size:7px;color:#aaa'>"+rSh+"</span> "+hns+"<br/>"+pls+"</td>";
        }
        cells+="</tr>";
      }
      return "<table class='chart-table'>"+cells+"</table>";
    }

    // ── Planet rows ──
    var plRows=(pos&&pos.length>0?[{pl:-1,sidDeg:lagna.sidDeg,ri:lagna.ri,sl:lagna.sl,nl:lagna.nl,subl:lagna.subl,ni:lagna.ni||0}].concat(pos.slice(0,9)):[]).map(function(p){
      var nm=p.pl===-1?(isTA?"லக்னம்":"Lagna"):pN2(p.pl);
      var kpe=KP249[Math.min(Math.floor(p.sidDeg*60/800)*9,248)]; // approx
      return "<tr><td>"+nm+"</td><td>"+rN2(p.ri)+"</td><td style='font-family:monospace'>"+fmtAbs(p.sidDeg)+"</td><td>"+sh2(p.sl)+"</td><td>"+nN2(p.ni||0)+"</td><td>"+sh2(p.nl)+"</td><td>"+sh2(p.subl)+"</td></tr>";
    }).join("");

    // ── Cusp rows ──
    var cuspRows=(cusps||[]).map(function(c){
      return "<tr><td>"+c.house+"</td><td>"+rN2(c.ri)+"</td><td style='font-family:monospace'>"+fmtAbs(c.d)+"</td><td>"+sh2(c.sl)+"</td><td>"+sh2(c.nl)+"</td><td>"+sh2(c.subl)+"</td></tr>";
    }).join("");

    // ── Panchang ──
    var panRows=panchang?[
      [isTA?"பட்சம்":"Paksha", isTA?panchang.paksha_ta:panchang.paksha_en],
      [isTA?"திதி":"Tithi", isTA?panchang.tithi_ta:panchang.tithi_en],
      [isTA?"நட்சத்திரம்":"Nakshatra", (isTA?panchang.nakshatra_ta:panchang.nakshatra_en)+" (Pada "+panchang.nakshatraPada+")"],
      [isTA?"யோகம்":"Yoga", isTA?panchang.yoga_ta:panchang.yoga_en],
      [isTA?"கரணம்":"Karana", (isTA?panchang.karana_ta:panchang.karana_en)]
    ].map(function(p){return "<tr><td>"+p[0]+"</td><td><b>"+p[1]+"</b></td></tr>";}).join(""):"";

    // ── Significator table ──
    function buildSigTable() {
      if(!pos||!cusps) return "";
      var PL9=pos.slice(0,9);
      var lagRiP=lagna?lagna.ri:0;
      function houseOf(p){ return ((p.ri-lagRiP+12)%12)+1; }
      function ownedH(pl){ return RS_LORD.map(function(l,ri){return l===pl?((ri-lagRiP+12)%12)+1:null;}).filter(Boolean); }
      var rows2="";
      [lagna].concat(PL9).forEach(function(p,idx){
        var nm=idx===0?(isTA?"லக்னம்":"Lagna"):pN2(p.pl);
        var h=houseOf(p);
        var oh=ownedH(idx===0?p.sl:p.pl);
        var nlH=p.nl!==undefined&&p.nl!==null?houseOf(pos[p.nl]||p):null;
        var nlOH=p.nl!==undefined&&p.nl!==null?ownedH(p.nl):[];
        var L1="H"+h; var L2=oh.length?"H"+oh.join(",H"):"";
        var L3=nlH?"H"+nlH:""; var L4=nlOH.length?"H"+nlOH.join(",H"):"";
        rows2+="<tr><td><b>"+nm+"</b></td><td>"+L1+"</td><td>"+L2+"</td><td>"+L3+"</td><td>"+L4+"</td></tr>";
      });
      return "<table><thead><tr><th>"+(isTA?"கிரகம்":"Planet")+"</th><th>L1</th><th>L2</th><th>L3</th><th>L4</th></tr></thead><tbody>"+rows2+"</tbody></table>";
    }

    // ── Ruling planets ──
    var rulingH="";
    if(data.ruling){
      var rl=data.ruling;
      rulingH="<table><thead><tr><th>"+(isTA?"வகை":"Type")+"</th><th>"+(isTA?"கிரகம்":"Planet")+"</th></tr></thead><tbody>"+
        ["<tr><td>"+(isTA?"வார அதிபதி":"Day Lord")+"</td><td><b>"+pN2(rl.dayLord)+"</b></td></tr>",
         "<tr><td>"+(isTA?"லக்ன நட்சத்திர அதிபதி":"Lagna Star Lord")+"</td><td><b>"+pN2(rl.lagnaStarLord)+"</b></td></tr>",
         "<tr><td>"+(isTA?"லக்ன உப அதிபதி":"Lagna Sub Lord")+"</td><td><b>"+pN2(rl.lagnaSubLord)+"</b></td></tr>",
         "<tr><td>"+(isTA?"சந்திர நட்சத்திர அதிபதி":"Moon Star Lord")+"</td><td><b>"+pN2(rl.moonStarLord)+"</b></td></tr>",
         "<tr><td>"+(isTA?"சந்திர உப அதிபதி":"Moon Sub Lord")+"</td><td><b>"+pN2(rl.moonSubLord)+"</b></td></tr>"
        ].join("")+"</tbody></table>";
    }

    // ── Dasa balance ──
    var dasaStr=pos&&pos.length>0?pN2(dasaBalance.planet)+" "+dasaBalance.years+"Y "+dasaBalance.months+"M "+dasaBalance.days+"D":"-";

    // ── Header ──
    var headerHtml=
      '<div class="no-print"><button onclick="window.print()" style="padding:8px 20px;background:#8B6914;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700;margin-right:8px;">🖨 '+(isTA?"PDF ஆக சேமி":"Save as PDF / Print")+'</button><span style="font-size:11px;color:#888;">'+(isTA?"'PDF சேமி' தேர்ந்தெடுக்கவும்":"Choose 'Save as PDF' in print dialog")+'</span></div>'+
      '<h1>🔭 AstroIGen — '+(isTA?"KP ஜோதிட அறிக்கை":"KP Astrology Report")+'</h1>'+
      '<div class="info-grid">'+
      '<div class="info-box"><label>'+(isTA?"பெயர்":"Name")+'</label><span>'+(inp.name||"-")+'</span></div>'+
      '<div class="info-box"><label>'+(isTA?"தேதி":"Date")+'</label><span>'+dateStr+'</span></div>'+
      '<div class="info-box"><label>'+(isTA?"நேரம் (IST)":"Time (IST)")+'</label><span>'+timeStr+'</span></div>'+
      '<div class="info-box"><label>'+(isTA?"இடம்":"Place")+'</label><span>'+(inp.place||"-")+'</span></div>'+
      '<div class="info-box"><label>'+(isTA?"லக்னம்":"Lagna")+'</label><span>'+rN2(lagna.ri)+" "+fmtDMS(lagna.sidDeg)+'</span></div>'+
      '<div class="info-box"><label>'+(isTA?"மீதமுள்ள தசா":"Dasa Balance")+'</label><span>'+dasaStr+'</span></div>'+
      '</div>';

    // ── Section 1: KP Chart ──
    var sec1=
      '<div class="section">'+
      '<h2>1. '+(isTA?"KP கட்டம்":"KP Chart")+'</h2>'+
      buildGrid(pos,lagna,cusps,inp.name,dateStr)+
      '<div class="two-col">'+
      '<div><h3>'+(isTA?"கிரகங்கள்":"Planets")+'</h3>'+
      '<table><thead><tr><th>'+(isTA?"கிரகம்":"Planet")+'</th><th>'+(isTA?"ராசி":"Sign")+'</th><th>'+(isTA?"பாகை":"Deg")+'</th><th>SL</th><th>'+(isTA?"நட்சத்திரம்":"Star")+'</th><th>NL</th><th>SubL</th></tr></thead><tbody>'+plRows+'</tbody></table></div>'+
      '<div><h3>'+(isTA?"பாவ ஆரம்புமுனைகள்":"House Cusps")+'</h3>'+
      '<table><thead><tr><th>'+(isTA?"வீடு":"House")+'</th><th>'+(isTA?"ராசி":"Sign")+'</th><th>'+(isTA?"பாகை":"Deg")+'</th><th>SL</th><th>NL</th><th>SubL</th></tr></thead><tbody>'+cuspRows+'</tbody></table></div>'+
      '</div>'+
      '</div>';

    // ── Section 2: Significators & Ruling ──
    var sec2=
      '<div class="section">'+
      '<h2>2. '+(isTA?"கிரக முக்கியத்துவம் & ஆளும் கிரகங்கள்":"Significators & Ruling Planets")+'</h2>'+
      '<div class="two-col">'+
      '<div><h3>'+(isTA?"L1-L4 முக்கியத்துவம்":"L1-L4 Significators")+'</h3>'+buildSigTable()+'</div>'+
      '<div><h3>'+(isTA?"ஆளும் கிரகங்கள்":"Ruling Planets")+'</h3>'+rulingH+'</div>'+
      '</div>'+
      '</div>';

    // ── Section 3: Panchang ──
    var sec3=
      '<div class="section">'+
      '<h2>3. '+(isTA?"பஞ்சாங்கம்":"Panchang")+'</h2>'+
      '<table><tbody>'+panRows+'</tbody></table>'+
      '</div>';

    // ── Section 4: Dasa table ──
    var DASA_SEQ2=[8,5,0,1,2,7,4,6,3];
    var DASA_YRS2=[7,20,6,10,7,18,16,19,17];
    var TOTAL2=120;
    var dasaSec="";
    if(pos&&pos.length>0){
      var moonSid2=pos[1].sidDeg;
      var ni2=pos[1].ni;
      var arcInNk2=(moonSid2*60)-ni2*800;
      var frac2=arcInNk2/800;
      var dasaPl2=NK[ni2][2];
      var dasaYrs2=DASA[dasaPl2];
      var elapsed2=frac2*dasaYrs2;
      var seqIdx2=DASA_SEQ2.indexOf(dasaPl2);
      var bYr2=inp.year+(inp.month-1)/12+(inp.day-1)/365.25+(inp.utHr/24)/365.25;
      var dStart2=bYr2-elapsed2;
      var maxYr2=bYr2+100;
      function yrDs(yr){var y=Math.floor(yr);var rem=(yr-y)*365.25;var mo=Math.floor(rem/30.44)+1;var dy=Math.floor(rem%30.44)+1;if(mo>12)mo=12;if(dy<1)dy=1;if(dy>28)dy=28;return String(dy).padStart(2,"0")+"/"+String(mo).padStart(2,"0")+"/"+y;}
      var todayNow=new Date().getFullYear()+(new Date().getMonth())/12+(new Date().getDate())/365.25;
      var dasaRows2="";
      for(var di2=0;di2<9;di2++){
        var dIdx2=(seqIdx2+di2)%9;
        var dPl2=DASA_SEQ2[dIdx2];var dY2=DASA_YRS2[dIdx2];var dEn2=dStart2+dY2;
        if(dStart2>maxYr2){dStart2=dEn2;continue;}
        var isCurD2=dStart2<=todayNow&&dEn2>todayNow;
        var isPastD2=dEn2<=todayNow;
        var bStart2=dStart2;
        for(var bi2=0;bi2<9;bi2++){
          var bIdx2=(DASA_SEQ2.indexOf(dPl2)+bi2)%9;
          var bPl2=DASA_SEQ2[bIdx2];var bDur2=dY2*(DASA_YRS2[bIdx2]/TOTAL2);var bEn2=bStart2+bDur2;
          if(bStart2>maxYr2){bStart2=bEn2;continue;}
          var isCurB2=bStart2<=todayNow&&bEn2>todayNow;
          var isPastB2=bEn2<=todayNow;
          var style2='opacity:'+(isPastB2?'0.4':'1')+';background:'+(isCurB2?'#fff8e0':'#fff')+';';
          dasaRows2+="<tr style='"+style2+"'><td><b>"+pN2(dPl2)+"</b></td><td>"+pN2(bPl2)+"</td><td style='font-family:monospace;font-size:9px'>"+yrDs(bStart2)+"</td><td style='font-family:monospace;font-size:9px'>"+yrDs(bEn2)+"</td><td>"+(isCurB2?"▶ NOW":isPastB2?"past":"")+"</td></tr>";
          bStart2=bEn2;
        }
        dStart2=dEn2;
      }
      dasaSec='<div class="section"><h2>4. '+(isTA?"தசா - புக்தி (100 ஆண்டுகள்)":"Dasa - Bhukthi (100 Years)")+'</h2>'+
        '<table><thead><tr><th>'+(isTA?"தசா":"Dasa")+'</th><th>'+(isTA?"புக்தி":"Bhukthi")+'</th><th>'+(isTA?"தொடக்கம்":"From")+'</th><th>'+(isTA?"முடிவு":"To")+'</th><th></th></tr></thead><tbody>'+dasaRows2+'</tbody></table></div>';
    }

    var footer='<div class="footer">AstroIGen — KP Astrology Software | Lahiri Ayanamsa '+(data.ayan?fmtAbs(data.ayan):"")+' | astroigen.netlify.app</div>';

    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KP Report - '+(inp.name||"")+'</title><style>'+css+'</style></head><body>'+headerHtml+sec1+sec2+sec3+dasaSec+footer+'</body></html>';

    var w=window.open("","_blank","width=960,height=900,menubar=yes,toolbar=yes");
    if(w){ w.document.write(html); w.document.close(); w.onload=function(){w.focus();w.print();}; }
  }

  var tabHeaders = ce("div", { style:{marginBottom:"14px"} },
    ce("div", { style:{display:"flex",alignItems:"center",borderRadius:"9px 9px 0 0",border:"1px solid "+C.bdr,background:C.bg1} },
      ce("div", {style:{display:"flex",overflowX:"auto",scrollbarWidth:"none",flex:1,minWidth:0}},
        (function(){
          // Gochara mode: only Basic Info + KP Chart tabs
          if (isGochara) {
            return GOCHARA_STAB_IDS.map(function(id, i) {
              return ce(TabBtn, { key:id, label: isTA?GOCHARA_STABS_TA[i]:GOCHARA_STABS_EN[i], active:stab===id, onClick:function(){setStab(id);} });
            });
          }
          // Build ordered tab list — for kp249 put prasnam first
          var baseIds = STAB_IDS.slice();
          var baseEns = STABS_EN.slice();
          var baseTas = STABS_TA.slice();

          return baseIds.map(function(id, i) {
            return ce(TabBtn, { key:id, label: isTA?baseTas[i]:baseEns[i], active:stab===id, onClick:function(){setStab(id);} });
          });
        })()
      )
    )
  );

  var content = null;

// ─── Transit vs Natal Comparison ─────────────────────────────────────────────
function TransitVsNatal(props) {
  useTheme();
  var data = props.data, lang = props.lang, isTA = lang === "ta";
  var positions = data.positions, lagna = data.lagna, cusps = data.cusps || [];

  }, []);

  var tPos  = tData.positions;
  var nPos  = positions;
  var tLagna = tData.lagna;
  // Compute natal mandi on-the-fly if not pre-computed (older charts)
  var nMandi = data.mandi ? data.mandi : (function(){
    try {
      var inp = data.input;
      if (!inp) return null;
      var jd0 = julianDay(inp.year, inp.month, inp.day, inp.utHr);
      var T0  = (jd0 - 2451545.0) / 36525.0;
      var ay0 = lahiriAyanamsa(T0);
      return calcMandi(inp.year, inp.month, inp.day, inp.utHr, inp.lat, inp.lon, ay0);
    } catch(e) { return null; }
  })();
  var tMandi = tData.mandi ? tData.mandi : null;
  var lagRi = lagna.ri;
  function rasiToHouse(ri) { return ((ri - lagRi + 12) % 12) + 1; }

  var nk = function(ni) { return isTA ? NK_TA[ni] : NK_EN[ni]; };

    var borderRight  = col < 3 ? BCLR_D : "none";
    var borderBottom = r   < 3 ? BCLR_D : "none";

      return ce("div",{key:"ctr",style:{gridColumn:"2/4",gridRow:"2/4",background:C.bg1,
        borderRight:BCLR_D,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"4px"}},
        ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:800,letterSpacing:"1px",marginBottom:"2px"}},"DUAL"),
        ce("div",{style:{fontSize:"9px",color:C.muted,textAlign:"center"}},

  // Vathai (Naidhana) stars — star counts 7, 18 and 22 — dasai not to be activated
  var VATHAI_STARS = [7, 18, 22]; // star count positions (1-based) — do NOT activate dasai

  // All 27 stars fixed from birth star (nNi) — tara count 1..27
  var forecast = [];
  for (var fi = 0; fi < 27; fi++) {
    var fNi = (nNi + fi) % 27;          // always starts from birth star
    var fTara = fi + 1;                  // tara count 1 to 27 (fixed position)
    var fTaraCycle = ((fTara - 1) % 9) + 1;
    var isVathai = VATHAI_STARS.indexOf(fTara) !== -1;
    var isCurrent = (fNi === tNi);       // highlight current moon position
    forecast.push({
      ni: fNi,
      name: isTA ? NK_TA[fNi] : NK_EN[fNi],
      lord: NK_LORD_EN[fNi],
      tara: fTaraCycle,
      taraName: TARA_NAMES[fTaraCycle-1],
      nature: NK_NATURE[fNi],
      clr: taraClrs[fTaraCycle-1],
      starCount: fTara,
      isVathai: isVathai,
      isCurrent: isCurrent,
      isChandrashtama: (function(){
        var c8Rasi = (nMoon.ri + 7) % 12;
        var startRasi = Math.floor(fNi * (360/27) / 30);
        var endRasi   = Math.floor(((fNi+1) * (360/27) - 0.001) / 30);
        return startRasi === c8Rasi || endRasi === c8Rasi;
      })()
    });
  }

function GocharaGrid(props) {
  useTheme();
  var gpPositions = props.positions;
  var gpLagna     = props.lagna;
  var gpCusps     = props.cusps || [];
  var gpIsTA      = props.lang === "ta";
  var gpSh        = function(i){ return gpIsTA ? PL_STA[i] : PL_SEN[i]; };
  var BCLR = "1px solid "+C.bdr;
  var CH_PX       = 150;
  var FLAT        = [11,0,1,2, 10,-1,-1,3, 9,-1,-1,4, 8,7,6,5];
  var gpLagRi     = gpLagna.ri;

  function gpFmt(deg) {
    var s = deg % 30;
    var D = Math.floor(s);
    var mf = (s - D) * 60;
    var M = Math.floor(mf);
    var S = Math.floor((mf - M) * 60);
    return D + "." + String(M).padStart(2,"0") + "." + String(S).padStart(2,"0");
  }

  // Planet map: rasi -> array of planet objects
  var gpPM = {};
  if (!gpPM[gpLagRi]) gpPM[gpLagRi] = [];
  gpPM[gpLagRi].unshift({
    lbl: gpIsTA ? "லக்" : "Lag",
    deg: gpLagna.sidDeg,
    nl:  gpSh(gpLagna.nl),
    sub: gpSh(gpLagna.subl),
    clr: "#44ff88"
  });
  for (var gpi = 0; gpi < gpPositions.length; gpi++) {
    var gpp = gpPositions[gpi];
    if (!gpPM[gpp.ri]) gpPM[gpp.ri] = [];
    gpPM[gpp.ri].push({
      lbl: gpSh(gpp.pl),
      deg: gpp.sidDeg,
      nl:  gpSh(gpp.nl),
      sub: gpSh(gpp.subl),
      clr: plClr(gpp.pl)
    });
  }

  // Cusp map: rasi -> array of cusp objects
  var gpCM = {};
  for (var gci = 0; gci < gpCusps.length; gci++) {
    var gcc = gpCusps[gci];
    if (!gpCM[gcc.ri]) gpCM[gcc.ri] = [];
    gpCM[gcc.ri].push(gcc);
  }

  var cells = [];
  for (var grow = 0; grow < 4; grow++) {
    for (var gcol = 0; gcol < 4; gcol++) {
      var grasi = FLAT[grow * 4 + gcol];
      var gIsCenter = (grasi === -1);
      if (gIsCenter && !(grow === 1 && gcol === 1)) continue;
      var gBR = gcol < 3 ? BCLR : "none";
      var gBB = grow < 3 ? BCLR : "none";

      if (gIsCenter) {
        cells.push(ce("div", {key:"center", style:{
          gridColumn:"2 / 4", gridRow:"2 / 4", background:C.bg1,
          borderRight:BCLR, borderBottom:"none", borderLeft:"none", borderTop:"none",
          display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", padding:"4px", boxSizing:"border-box"
        }},
          ce("div", {style:{color:"#55ddff",fontSize:"11px",fontWeight:800,textAlign:"center"}},
            gpIsTA ? "கோச்சார KP" : "Transit KP"),
          ce("div", {style:{color:"#44ff88",fontSize:"9px",textAlign:"center",marginTop:"3px"}},
            gpIsTA ? "தற்போதைய லக்னம்" : "Current Lagna"),
          ce("div", {style:{color:C.acc2,fontSize:"9px",textAlign:"center",marginTop:"2px"}},
            gpIsTA ? RS_TA[gpLagRi] : RS_EN[gpLagRi])
        ));
      } else {
        var gCellPl = gpPM[grasi] || [];
        var gCellCu = gpCM[grasi] || [];
        var gIsLag  = grasi === gpLagRi;

        cells.push(ce("div", {key: grow+"-"+gcol, style:{
          height: CH_PX+"px", borderRight:gBR, borderBottom:gBB,
          borderLeft:"none", borderTop:"none",
          background: gIsLag ? C.bg4 : C.bg2,
          position:"relative", overflow:"hidden",
          boxSizing:"border-box", padding:"2px 3px"
        }},
          ce("div", {style:{fontSize:"8px", color: gIsLag?"#44ff88":"#484868",
            fontFamily:"monospace", fontWeight:700, lineHeight:1}},
            gpIsTA ? RS_TA[grasi].substring(0,3) : RS_SH[grasi]),
          gIsLag && ce("div", {style:{position:"absolute",top:"2px",right:"3px",
            fontSize:"8px",color:"#44ff88",fontWeight:700}},
            gpIsTA ? "லக்" : "Lag"),
          ce("div", {style:{marginTop:"2px"}},
            gCellPl.map(function(pp, ppi) {
              return ce("div", {key:ppi, style:{marginBottom:"1px"}},
                ce("div", {style:{display:"flex",gap:"3px",alignItems:"baseline",lineHeight:1.3}},
                  ce("span", {style:{color:pp.clr,fontWeight:700,fontSize:"11px",
                    fontFamily:"monospace",minWidth:"18px"}}, pp.lbl),
                  pp.nl  && ce("span", {style:{color:"#4488ee",fontSize:"9px",fontFamily:"monospace"}}, pp.nl),
                  pp.sub && ce("span", {style:{color:"#ffaa44",fontSize:"9px",fontFamily:"monospace"}}, pp.sub)
                ),
                ce("div", {style:{color:C.acc2,fontSize:"9px",fontFamily:"monospace",
                  lineHeight:1.2,paddingLeft:"2px"}}, gpFmt(pp.deg))
              );
            })
          ),
          gCellCu.length > 0 && ce("div", {style:{
            borderTop:"1px solid "+C.bdr, marginTop:"3px", paddingTop:"2px"
          }},
            gCellCu.map(function(hc, hci) {
              return ce("div", {key:hci, style:{fontSize:"9px",color:C.muted,
                fontFamily:"monospace",lineHeight:1.4}},
                toRoman(hc.house) + " " + fmtSign(hc.d)
              );
            })
          )
        ));
      }
    }
  }

  return ce("div", {style:{
    display:"grid",
    gridTemplateColumns:"25% 25% 25% 25%",
    gridTemplateRows: CH_PX+"px "+CH_PX+"px "+CH_PX+"px "+CH_PX+"px",
    width:"100%", border:"2px solid #55ddff", borderRadius:"4px",
    overflow:"hidden", background:C.bg1,
    boxShadow:"0 4px 20px rgba(0,0,0,.7)", boxSizing:"border-box"
  }}, cells);
}







// KPLookup 
function KPLookup(props) {
  useTheme();
  var lang=props.lang, isTA=lang==="ta", gData=props.gData||null;
  var _a=useState(""), num=_a[0], setNum=_a[1];
  var _b=useState(null), res=_b[0], setRes=_b[1];
  var lc={gold:C.acc2,cyan:"#55ddff",green:"#44ff88",red:"#ff5566",grey:C.muted,purple:"#cc88ff"};

  function lookup(n) {
    n=parseInt(n,10);
    if(isNaN(n)||n<1||n>249){setRes(null);return;}
    var entry=KP249[n-1]; if(!entry){setRes(null);return;}
    // entry has: sg(rasi 0-11), nk(nakshatra idx), subl(sub lord planet idx), d0(start deg), d1(end deg)
    // Treat d0 as the "lagna degree" - build KP chart + cusp table from this degree
    var lagDeg = entry.d0; // absolute sidereal degree
    var lagRi = entry.sg;
    // Build 12 house cusps: equal house from lagna degree
    var cusps = [];
    for(var h=0;h<12;h++){
      var cDeg = (lagDeg + h*30) % 360;
      var cRi = Math.floor(cDeg/30)%12;
      var kp = getKP(cDeg);
      cusps.push({house:h+1, d:cDeg, ri:cRi, sl:kp.sl, nl:kp.nl, subl:kp.subl});
    }
    // Lagna object
    var lagKP = getKP(lagDeg);
    var lagna = {sidDeg:lagDeg, ri:lagRi, sl:lagKP.sl, nl:lagKP.nl, subl:lagKP.subl};
    setRes({n:n, entry:entry, lagna:lagna, cusps:cusps});
  }

  function randomPick() {
    var r=Math.floor(Math.random()*249)+1;
    setNum(String(r)); lookup(r);
  }

  var sh = function(i){ return isTA?PL_STA[i]:PL_SEN[i]; };

  return ce("div",null,
    // Input card
    ce("div",{style:{background:C.bg4,border:"1px solid "+C.bdr,borderRadius:"10px",padding:"14px",marginBottom:"10px"}},
      ce("div",{style:{color:LC.gold,fontWeight:700,marginBottom:"10px",fontSize:"13px"}},
        isTA?"KP எண் தேர்வு (1-249)":"KP Number Lookup (1-249)"),
      ce("div",{style:{display:"flex",gap:"8px"}},
        ce("input",{type:"number",min:1,max:249,value:num,
          onChange:function(e){setNum(e.target.value); if(e.target.value) lookup(e.target.value);},
          placeholder:"1 - 249",
          style:{flex:1,background:C.bg5,border:"1px solid #333355",borderRadius:"6px",
            padding:"8px 12px",color:"#d0d0e8",fontSize:"18px",fontWeight:700,outline:"none"}}),
        ce("button",{onClick:function(){lookup(num);},
          style:{padding:"8px 16px",background:C.purpleBg,border:"1px solid "+LC.purple,
            borderRadius:"6px",color:LC.purple,cursor:"pointer",fontWeight:700}},
          isTA?"தேடு":"Go"),
        ce("button",{onClick:randomPick,
          style:{padding:"8px 14px",background:C.bg5,border:"1px solid "+LC.cyan,
            borderRadius:"6px",color:LC.cyan,cursor:"pointer",fontWeight:700,fontSize:"12px"}},
          isTA?"சீரற்ற":"Random")
      ),
      !res&&num&&parseInt(num)&&ce("div",{style:{color:LC.red,fontSize:"12px",marginTop:"6px"}},
        isTA?"தவறான எண் (1-249)":"Invalid number (1-249)")
    ),

    // KP Number info bar
    res&&ce("div",{style:{background:C.bg4,border:"1px solid "+C.bdr,borderRadius:"10px",
      padding:"10px 14px",marginBottom:"10px",display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}},
      ce("div",{style:{background:LC.purple+"22",border:"1px solid "+LC.purple+"88",borderRadius:"8px",
        padding:"6px 14px",textAlign:"center",minWidth:"60px"}},
        ce("div",{style:{fontSize:"9px",color:LC.grey}},isTA?"KP எண்":"KP No."),
        ce("div",{style:{fontSize:"22px",fontWeight:900,color:LC.purple}},res.n)
      ),
      ce("div",{style:{flex:1,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}},

function KPNumGrid(props) {
  useTheme();
  var kpLagna   = props.lagna;
  var kpCusps   = props.cusps;
  var kpTPosns  = props.tpositions || [];
  var kpIsTA    = props.lang === "ta";
  var kpSelNum  = props.selNum;
  var kpSh      = function(i){ return kpIsTA ? PL_STA[i] : PL_SEN[i]; };
  var BCLR = "1px solid "+C.bdr;
  var CH_PX     = 150;
  var FLAT      = [11,0,1,2, 10,-1,-1,3, 9,-1,-1,4, 8,7,6,5];

  function kpFmt(deg) {
    var s = deg % 30;
    var D = Math.floor(s);
    var M = Math.floor((s-D)*60);
    var S = Math.floor(((s-D)*60 - M)*60);
    return D + "." + String(M).padStart(2,"0") + "." + String(S).padStart(2,"0");
  }

  // Cusp map: rasi -> cusps
  var kpCM = {};
  for (var kci = 0; kci < kpCusps.length; kci++) {
    var kcc = kpCusps[kci];
    if (!kpCM[kcc.ri]) kpCM[kcc.ri] = [];
    kpCM[kcc.ri].push(kcc);
  }

  // Transit planet map: rasi -> planets
  var kpPM = {};
  for (var kpi = 0; kpi < kpTPosns.length; kpi++) {
    var kpp = kpTPosns[kpi];
    if (!kpPM[kpp.ri]) kpPM[kpp.ri] = [];
    kpPM[kpp.ri].push({
      lbl: kpSh(kpp.pl),
      deg: kpp.sidDeg,
      nl:  kpSh(kpp.nl),
      sub: kpSh(kpp.subl),
      clr: plClr(kpp.pl)
    });
  }

  var kpLagRi = kpLagna.ri;

  var cells = [];
  for (var krow = 0; krow < 4; krow++) {
    for (var kcol = 0; kcol < 4; kcol++) {
      var krasi = FLAT[krow * 4 + kcol];
      var kIsCenter = (krasi === -1);
      if (kIsCenter && !(krow === 1 && kcol === 1)) continue;
      var kBR = kcol < 3 ? BCLR : "none";
      var kBB = krow < 3 ? BCLR : "none";

      if (kIsCenter) {
        cells.push(ce("div", {key:"center", style:{
          gridColumn:"2 / 4", gridRow:"2 / 4", background:C.bg1,
          borderRight:BCLR, borderBottom:"none", borderLeft:"none", borderTop:"none",
          display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", padding:"6px"
        }},
          ce("div", {style:{color:"#cc88ff",fontSize:"11px",fontWeight:800,textAlign:"center"}},
            "KP Lookup"),
          ce("div", {style:{color:"#44ff88",fontSize:"9px",textAlign:"center",marginTop:"3px"}},
            kpIsTA ? "லக்னம்" : "Lagna"),
          ce("div", {style:{color:C.acc2,fontSize:"9px",textAlign:"center",marginTop:"2px"}},
            kpIsTA ? RS_TA[kpLagRi] : RS_EN[kpLagRi]),
          ce("div", {style:{color:"#cc88ff",fontSize:"14px",fontWeight:900,textAlign:"center",marginTop:"4px"}},
            "KP#" + kpSelNum)
        ));
      } else {
        var kCellCu = kpCM[krasi] || [];
        var kCellPl = kpPM[krasi] || [];
        var kIsLag  = krasi === kpLagRi;

        cells.push(ce("div", {key: krow+"-"+kcol, style:{
          height: CH_PX+"px", borderRight:kBR, borderBottom:kBB,
          borderLeft:"none", borderTop:"none",
          background: kIsLag ? C.bg4 : C.bg2,
          position:"relative", overflow:"hidden",
          boxSizing:"border-box", padding:"2px 3px"
        }},
          ce("div", {style:{fontSize:"8px", color: kIsLag?"#44ff88":"#484868",
            fontFamily:"monospace", fontWeight:700, lineHeight:1}},
            kpIsTA ? RS_TA[krasi].substring(0,3) : RS_SH[krasi]),
          kIsLag && ce("div", {style:{position:"absolute",top:"2px",right:"3px",
            fontSize:"8px",color:"#44ff88",fontWeight:700}},
            kpIsTA ? "லக்" : "Lag"),
          ce("div", {style:{marginTop:"2px"}},
            kCellCu.map(function(hc, hci) {
              return ce("div", {key:hci, style:{fontSize:"9px",color:C.muted,
                fontFamily:"monospace",lineHeight:1.4}},
                toRoman(hc.house) + " " + fmtSign(hc.d)
              );
            })
          ),
          kCellPl.length > 0 && ce("div", {style:{
            borderTop:"1px solid "+C.bdr, marginTop:"3px", paddingTop:"2px"
          }},
            kCellPl.map(function(pp, ppi) {
              return ce("div", {key:ppi, style:{marginBottom:"1px"}},
                ce("div", {style:{display:"flex",gap:"3px",alignItems:"baseline",lineHeight:1.3}},
                  ce("span", {style:{color:pp.clr,fontWeight:700,fontSize:"11px",
                    fontFamily:"monospace",minWidth:"18px"}}, pp.lbl),
                  pp.nl  && ce("span", {style:{color:"#4488ee",fontSize:"9px",fontFamily:"monospace"}}, pp.nl),
                  pp.sub && ce("span", {style:{color:"#ffaa44",fontSize:"9px",fontFamily:"monospace"}}, pp.sub)
                ),
                ce("div", {style:{color:C.acc2,fontSize:"9px",fontFamily:"monospace",
                  lineHeight:1.2,paddingLeft:"2px"}}, kpFmt(pp.deg))
              );
            })
          )
        ));
      }
    }
  }

  return ce("div", {style:{
    display:"grid",
    gridTemplateColumns:"25% 25% 25% 25%",
    gridTemplateRows: CH_PX+"px "+CH_PX+"px "+CH_PX+"px "+CH_PX+"px",
    width:"100%", border:"2px solid #cc88ff", borderRadius:"4px",
    overflow:"hidden", background:C.bg1,
    boxShadow:"0 4px 20px rgba(0,0,0,.7)", boxSizing:"border-box"
  }}, cells);
}

// Planet aspects: returns array of absolute degrees aspected by planet at given degree
function getPlanetAspects(pl, deg) {
  // pl: 0=Sun,1=Moon,2=Mars,3=Mercury,4=Jupiter,5=Venus,6=Saturn,7=Rahu,8=Ketu
  // Sun,Moon,Mercury,Venus: 7th only
  // Mars: 4th,7th,8th
  // Jupiter: 5th,7th,9th
  // Saturn: 3rd,7th,10th
  // Rahu,Ketu: NO vision/aspect
  if (pl === 7 || pl === 8) return []; // Rahu/Ketu have no aspect/vision
  var aspects = [180]; // 7th aspect for all other planets
  if (pl === 2) aspects = aspects.concat([90, 210]);   // Mars: +4th(90),+8th(210)
  if (pl === 4) aspects = aspects.concat([120, 240]);  // Jupiter: +5th(120),+9th(240)
  if (pl === 6) aspects = aspects.concat([60, 270]);   // Saturn: +3rd(60),+10th(270)
  return aspects.map(function(a){ return (deg + a) % 360; });
}

// Check if two degrees are within +-15 orb
function withinOrb(d1, d2) {
  var diff = Math.abs(d1 - d2) % 360;
  if (diff > 180) diff = 360 - diff;
  return diff <= 15;
}

// Get enhanced ruling planets (5 standard + aspects to lagna/moon + Rahu/Ketu always)
function getEnhancedRulingPlanets(positions, lagna, chartData, cusps, lagnaRi) {
  var moonPos = positions[1];
  var lagDeg = lagna.sidDeg;
  var moonDeg = moonPos.sidDeg;

  // Day lord: Sun=0,Mon=1,Tue=2(Mars),Wed=3(Mer),Thu=4(Jup),Fri=5(Ven),Sat=6
  var DAY_LORDS = [0,1,2,3,4,5,6];
  var dayLord = DAY_LORDS[new Date().getDay()];

  var rp = new Set();

  // Standard 5 ruling planets
  rp.add(dayLord);
  rp.add(lagna.sl);   // lagna sign lord
  rp.add(lagna.nl);   // lagna star lord
  rp.add(moonPos.sl); // moon sign lord
  rp.add(moonPos.nl); // moon star lord

  // Any planet aspecting lagna or moon within +-15 orb
  positions.forEach(function(p) {
    if (p.pl > 8) return;
    var aspDegrees = getPlanetAspects(p.pl, p.sidDeg);
    aspDegrees.forEach(function(aspDeg) {
      if (withinOrb(aspDeg, lagDeg) || withinOrb(aspDeg, moonDeg)) {
        rp.add(p.pl);
      }
    });
  });

  // Rahu and Ketu always included
  rp.add(7); rp.add(8);

  // Rahu/Ketu absorption: expand their connected planets into ruling planets
  // If cusps and lagnaRi available (birth chart / gochara mode)
  if (cusps && lagnaRi !== undefined) {
    [7, 8].forEach(function(rkPl) {
      var connected = getRahuKetuConnections(rkPl, positions, cusps, lagnaRi);
      connected.forEach(function(cp) { rp.add(cp); });
    });
  }

  return Array.from(rp);
}

function getRahuKetuConnections(pl, positions, cusps, lagnaRi) {
  if (pl !== 7 && pl !== 8) return [];

    var aspDegrees = getPlanetAspects(p.pl, p.sidDeg);
    aspDegrees.forEach(function(aspDeg) {
      if (withinOrb(aspDeg, pos.sidDeg)) connected.add(p.pl);
    });
  });
  // 4. Planets conjunct Rahu/Ketu (within 15 deg)
  positions.forEach(function(p) {
    if (p.pl > 8 || p.pl === pl) return;
    if (withinOrb(p.sidDeg, pos.sidDeg)) connected.add(p.pl);
  });
  // 5. Planets in Rahu/Ketu's star (nl)
  positions.forEach(function(p) {
    if (p.pl > 8 || p.pl === pl) return;
    if (p.nl === pl) connected.add(p.pl);

  // 6. Rahu/Ketu aspects other planets

    aspDegrees.forEach(function(aspDeg) {
