  return Array.from(connected);
}

// ── NEW: Priority-order Rahu/Ketu 4-rule check for promise house connection ──
// Used ONLY for Condition 1 (promise check) in Technique 6 / KP chart analysis.
// Rules checked in order 1→2→3→4; stops at first rule that connects to promiseH.
// Returns { connected: true/false, rule: 1-4 or null, planets: [] }
function rahuKetuPromiseCheck(pl, positions, promiseHouses, getPlanetAllSigsFn) {
  if (pl !== 7 && pl !== 8) return { connected: false, rule: null, planets: [] };
  var pos = positions.find(function(p){ return p.pl === pl; });
  if (!pos) return { connected: false, rule: null, planets: [] };

  function plSignifiesPromise(p) {
    var sigs = getPlanetAllSigsFn(p);
    return promiseHouses.some(function(h){ return sigs.indexOf(h) !== -1; });
  }

  // Rule 1: Sign lord
  var signLord = pos.sl;
  if (signLord !== null && signLord !== undefined && plSignifiesPromise(signLord)) {
    return { connected: true, rule: 1, planets: [signLord] };
  }

  // Rule 2: Star lord
  var starLord = pos.nl;
  if (starLord !== null && starLord !== undefined && plSignifiesPromise(starLord)) {
    return { connected: true, rule: 2, planets: [starLord] };
  }

  // Rule 3: Planets aspecting Rahu/Ketu
  var rule3Planets = [];
  positions.forEach(function(p) {
    if (p.pl > 8 || p.pl === pl) return;
    var aspDegrees = getPlanetAspects(p.pl, p.sidDeg);
    aspDegrees.forEach(function(aspDeg) {
      if (withinOrb(aspDeg, pos.sidDeg) && plSignifiesPromise(p.pl)) {
        if (rule3Planets.indexOf(p.pl) === -1) rule3Planets.push(p.pl);
      }
    });
  });
  if (rule3Planets.length > 0) {
    return { connected: true, rule: 3, planets: rule3Planets };
  }

  // Rule 4: Planets in Rahu/Ketu's own stars
  var rule4Planets = [];
  positions.forEach(function(p) {
    if (p.pl > 8 || p.pl === pl) return;
    if (p.nl === pl && plSignifiesPromise(p.pl)) {
      if (rule4Planets.indexOf(p.pl) === -1) rule4Planets.push(p.pl);
    }
  });
  if (rule4Planets.length > 0) {
    return { connected: true, rule: 4, planets: rule4Planets };
  }

  return { connected: false, rule: null, planets: [] };
}

// Get all planets influencing a planet (aspects + conjunctions)
function getPlanetInfluences(pl, positions) {
  var pos = positions.find(function(p){ return p.pl === pl; });
  if (!pos) return [];
  var influences = new Set();
  positions.forEach(function(p) {
    if (p.pl > 8 || p.pl === pl) return;
    // Conjunction
    if (withinOrb(p.sidDeg, pos.sidDeg)) { influences.add(p.pl); return; }
    // Aspects
    var aspDegrees = getPlanetAspects(p.pl, p.sidDeg);
    aspDegrees.forEach(function(aspDeg) {
      if (withinOrb(aspDeg, pos.sidDeg)) influences.add(p.pl);
    });
  });
  return Array.from(influences);
}

// Get L1/L2/L3/L4 significators for a specific house
function getHouseSigs(houseNum, positions, cusps, lagnaRi) {
  var L1=[],L2=[],L3=[],L4=[];

  // KP correct method: use CUSP BOUNDARIES to find house occupants
  // A planet is in a house if its sidDeg falls between that house cusp
  // and the next house cusp (handling 360 wraparound)
  var cuspStart = cusps[houseNum-1] ? cusps[houseNum-1].sidDeg : (lagnaRi*30 + (houseNum-1)*30) % 360;
  var cuspEnd   = cusps[houseNum%12] ? cusps[houseNum%12].sidDeg : (cuspStart+30) % 360;

  function isBetweenCusps(deg) {
    if (cuspStart <= cuspEnd) return deg >= cuspStart && deg < cuspEnd;
    // Wraparound: e.g. cusp at 350, next at 20
    return deg >= cuspStart || deg < cuspEnd;
  }

  // L2: planets whose sidereal degree falls inside this house (between cusps)
  positions.forEach(function(p){
    if(p.pl>8) return;
    if(isBetweenCusps(p.sidDeg)) L2.push(p.pl);
  });

  // L1: planets in the star of any L2 occupant (strongest significator)
  L2.forEach(function(occ){
    positions.forEach(function(p){
      if(p.pl>8) return;
      if(p.nl === occ && L1.indexOf(p.pl)===-1) L1.push(p.pl);
    });
  });

  // L4: sign lord of the rasi where this house CUSP falls
  var houseRi = cusps[houseNum-1] ? cusps[houseNum-1].ri : (lagnaRi + houseNum - 1) % 12;
  var lord = RS_LORD[houseRi];
  if(lord<=8) L4.push(lord);

  // L3: planets in the star of the house owner (L4)
  L4.forEach(function(own){
    positions.forEach(function(p){
      if(p.pl>8) return;
      if(p.nl === own && L3.indexOf(p.pl)===-1) L3.push(p.pl);
    });
  });

  return {L1:L1,L2:L2,L3:L3,L4:L4};
}

// Get combined significators for multiple houses with priority order
function getCombinedSigs(houses, positions, cusps, lagnaRi) {
  var allL1=[],allL2=[],allL3=[],allL4=[];
  houses.forEach(function(h){
    var s=getHouseSigs(h,positions,cusps,lagnaRi);
    s.L1.forEach(function(p){if(allL1.indexOf(p)===-1)allL1.push(p);});
    s.L2.forEach(function(p){if(allL2.indexOf(p)===-1)allL2.push(p);});
    s.L3.forEach(function(p){if(allL3.indexOf(p)===-1)allL3.push(p);});
    s.L4.forEach(function(p){if(allL4.indexOf(p)===-1)allL4.push(p);});
  });
  // Return in priority order L1>L2>L3>L4, deduplicated
  var seen=new Set(), result=[];
  [allL1,allL2,allL3,allL4].forEach(function(layer,li){
    layer.forEach(function(p){
      if(!seen.has(p)){seen.add(p);result.push({pl:p,layer:li+1});}
    });
  });
  return result; // [{pl, layer}]
}

// Sun trigger: scan a period day by day, find dates where
// Sun rasi lord AND Sun nakshatra star lord are BOTH common planets
// Returns array of trigger dates (as year floats), max 2
function findSunTriggers(startYr, endYr, commonPls) {
  if(commonPls.length === 0) return [];
  var triggers = [];
  // Step: every 5 days (Sun moves ~5 deg, stays in nakshatra ~13 days)
  var step = 5/365.25;
  var prev_rasi_lord = -1, prev_star_lord = -1;
  for(var yr = startYr; yr <= endYr && triggers.length < 2; yr += step) {
    // Convert year to JD
    var y = Math.floor(yr);
    var rem = (yr - y) * 365.25;
    var mo = Math.floor(rem / 30.44) + 1;
    var dy = Math.floor(rem % 30.44) + 1;
    if(mo > 12) mo = 12; if(dy > 28) dy = 28;
    var utHr = (rem % 1) * 24;
    var T = (julianDay(y, mo, dy, utHr) - 2451545.0) / 36525.0;
    var ayan = lahiriAyanamsa(T);
    var sunTrop = calcSun(T);
    var sunSid = norm(sunTrop - ayan);
    // Sun rasi and nakshatra
    var sunRi = Math.floor(sunSid / 30);
    var sunNi = Math.floor(sunSid / (800/60));
    var sunRasiLord = RS_LORD[sunRi];
    var sunStarLord = NK[sunNi][2];
    // Both must be common planets
    var rasiMatch = commonPls.indexOf(sunRasiLord) !== -1;
    var starMatch = commonPls.indexOf(sunStarLord) !== -1;
    // Detect transition into a new matching zone (avoid duplicates)
    var newZone = (sunRasiLord !== prev_rasi_lord || sunStarLord !== prev_star_lord);
    if(rasiMatch && starMatch && newZone) {
      triggers.push(yr);
    }
    prev_rasi_lord = sunRasiLord;
    prev_star_lord = sunStarLord;
  }
  return triggers;
}

function KPQueryAnalysis(props) {
  useTheme();
  var lang = props.lang, chartData = props.chartData;

  var _r = useState(null), result = _r[0], setResult = _r[1];

  var chatEndRef = useRef(null);

  function buildChartCtx() {
    if (!chartData) return "No chart loaded.";
    var NK_N=["Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha","Magha","PPhal","UPhal","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha","Mula","PAshadha","UAshadha","Shravana","Dhanishtha","Shatabhisha","PBhadra","UBhadra","Revati"];
    var lines=["CHART: "+chartData.input.day+"/"+chartData.input.month+"/"+chartData.input.year];
    chartData.positions.forEach(function(p){if(p.pl>8)return;var d=Math.floor(p.sidDeg%30),m=Math.floor((p.sidDeg%30-d)*60);lines.push(PL_EN[p.pl]+":"+RS_EN[p.ri]+" "+d+"d NK:"+NK_N[p.ni]+" SL:"+PL_EN[p.sl]+" NL:"+PL_EN[p.nl]+" Sub:"+PL_EN[p.subl]);});
    chartData.cusps.forEach(function(c,i){lines.push("H"+(i+1)+":"+RS_EN[c.ri]+" SL:"+PL_EN[c.sl]+" NL:"+PL_EN[c.nl]+" Sub:"+PL_EN[c.subl]);});
    if(chartData.significators) chartData.significators.forEach(function(s){if(s.pl<=8)lines.push("Sig "+PL_EN[s.pl]+":H"+s.all.join(","));});
    var cusps2=chartData.cusps, pos2=chartData.positions;
    if(cusps2&&pos2){
      // TRUE CONJUNCTIONS: planets sharing same bhava
      var bhavaGroups={};
      for(var hh=0;hh<12;hh++){
        var st=cusps2[hh].sidDeg, en=cusps2[(hh+1)%12].sidDeg, inH=[];
        pos2.forEach(function(p){if(p.pl>8)return;var deg=p.sidDeg;var inside=st<=en?(deg>=st&&deg<en):(deg>=st||deg<en);if(inside)inH.push(PL_EN[p.pl]);});
        if(inH.length>1)bhavaGroups["H"+(hh+1)]=inH;

      var bkeys=Object.keys(bhavaGroups);
      if(bkeys.length>0){lines.push("TRUE CONJUNCTIONS (same bhava - merged primary influence):");bkeys.forEach(function(h){lines.push(h+": "+bhavaGroups[h].join("+"));});}
      // PRIMARY SIGNIFICATOR HOUSES 2,6,9,11 per planet
      var primaryHouses=[2,6,9,11];
      var primarySigs=[];
      if(chartData.significators){
        chartData.significators.forEach(function(s){
          if(s.pl>8) return;
          var hasPrimary=primaryHouses.some(function(ph){return s.all&&s.all.indexOf(ph)!==-1;});

    }
    return lines.join("\n");
  }

  function analyze(topic) {
    if (!chartData) return;
    if (!chartData.positions || chartData.positions.length === 0) {
      setResult({empty:true,topic:topic}); return;
    }

    var positions = chartData.positions;
    var cusps = chartData.cusps;
    var lagna = chartData.lagna;
    var lagnaRi = lagna ? lagna.ri : 0;

    // -- CHILD INFERTILE CHECK ---------------------------------------------
    // Rule: Infertile rasi = Aries, Taurus, Leo
    // If bhava CSL rasi is infertile → that child IS the last. No more after.
    //   5th bhava infertile → 1st child is last → only 1 child total
    //   7th bhava infertile → 2nd child is last → max 2 children total
    //   9th bhava infertile → 3rd child is last → max 3 children total
    // This block runs ONLY for child topics (child, child2, child3).

    // Helper: get the rasi index of a bhava's CSL planet position
    function getBhavaCSLRasi(bhavaIdx) {
      var cslPl = cusps[bhavaIdx] ? cusps[bhavaIdx].subl : null;
      if (cslPl === null) return -1;
      var found = positions.find(function(p){ return p.pl === cslPl; });
      return found ? found.ri : -1;
    }

    if (topic.id === "child" || topic.id === "child2" || topic.id === "child3") {
      // Check 5th bhava CSL rasi — 1st child indicator
      var ri5 = getBhavaCSLRasi(4); // 5th bhava = index 4
      if (ri5 !== -1 && INFERTILE_RASI.indexOf(ri5) !== -1) {
        setResult({
          infertileBlock: true,
          topic: topic,
          blockedAt: "1st",
          blockedBhava: 5,
          blockedRasi: RS_EN[ri5],
          msg: isTA
            ? "5ம் பாவம் CSL " + RS_TA[ri5] + " (மலட்டு ராசி) ராசியில் உள்ளது. முதல் குழந்தை கடைசி குழந்தை. மேலும் குழந்தை இல்லை — மொத்தம் 1 குழந்தை மட்டுமே."
            : "5th bhava CSL is in " + RS_EN[ri5] + " (infertile rasi — Aries/Taurus/Leo). 1st child will be the last child. No more children after — total 1 child only."
        });
        return;
      }
    }

    if (topic.id === "child2" || topic.id === "child3") {
      // Check 7th bhava CSL rasi — 2nd child indicator
      var ri7 = getBhavaCSLRasi(6); // 7th bhava = index 6
      if (ri7 !== -1 && INFERTILE_RASI.indexOf(ri7) !== -1) {
        setResult({
          infertileBlock: true,
          topic: topic,
          blockedAt: "2nd",
          blockedBhava: 7,
          blockedRasi: RS_EN[ri7],
          msg: isTA
            ? "7ம் பாவம் CSL " + RS_TA[ri7] + " (மலட்டு ராசி) ராசியில் உள்ளது. இரண்டாம் குழந்தை கடைசி குழந்தை. மேலும் குழந்தை இல்லை — மொத்தம் 2 குழந்தைகள் மட்டுமே."
            : "7th bhava CSL is in " + RS_EN[ri7] + " (infertile rasi — Aries/Taurus/Leo). 2nd child will be the last child. No more children after — total 2 children only."
        });
        return;
      }
    }

    if (topic.id === "child3") {
      // Check 9th bhava CSL rasi — 3rd child indicator
      var ri9 = getBhavaCSLRasi(8); // 9th bhava = index 8
      if (ri9 !== -1 && INFERTILE_RASI.indexOf(ri9) !== -1) {
        setResult({
          infertileBlock: true,
          topic: topic,
          blockedAt: "3rd",
          blockedBhava: 9,
          blockedRasi: RS_EN[ri9],
          msg: isTA
            ? "9ம் பாவம் CSL " + RS_TA[ri9] + " (மலட்டு ராசி) ராசியில் உள்ளது. மூன்றாம் குழந்தை கடைசி குழந்தை. மேலும் குழந்தை இல்லை — மொத்தம் 3 குழந்தைகள் மட்டுமே."
            : "9th bhava CSL is in " + RS_EN[ri9] + " (infertile rasi — Aries/Taurus/Leo). 3rd child will be the last child. No more children after — total 3 children only."
        });
        return;
      }
    }

    // Helper: get planet object
    function getPos(pl){ return positions.find(function(p){return p.pl===pl;}); }
    function getPl_sl(pl){ var p=getPos(pl); return p?p.sl:null; }
    function getPl_nl(pl){ var p=getPos(pl); return p?p.nl:null; }
    function getPl_subl(pl){ var p=getPos(pl); return p?p.subl:null; }
    function getPl_ri(pl){ var p=getPos(pl); return p?p.ri:0; }
    function getPl_sidDeg(pl){ var p=getPos(pl); return p?p.sidDeg:0; }

    // -- STEP 1: Find CSL of main house --------------------------------------
    var csl = cusps[topic.mainHouse-1] ? cusps[topic.mainHouse-1].subl : null;
    if (csl === null) { setResult({empty:true,topic:topic}); return; }

    // -- CONDITION 1: Will it happen? ----------------------------------------
    // CSL's star lord
    var cslStarLord = getPl_nl(csl);

    // expandRahuKetu: used for timing/ruling planet checks (all connections merged)
    function expandRahuKetu(pl) {
      if (pl !== 7 && pl !== 8) return [pl];
      var conn = getRahuKetuConnections(pl, positions, cusps, lagnaRi);
      return [pl].concat(conn);
    }

    // Get sigs for a planet (L1/L2/L3/L4 houses it signifies)
    function getPlanetAllSigs(pl) {
      var houses = [];
      for (var h=1; h<=12; h++) {
        var hs = getHouseSigs(h, positions, cusps, lagnaRi);
        var allInH = hs.L1.concat(hs.L2).concat(hs.L3).concat(hs.L4);
        if (allInH.indexOf(pl) !== -1) houses.push(h);
      }
      return houses;
    }

    // ── Condition 1: Promise Check ───────────────────────────────────────────
    // SubLord = normal planet → check StarLord houses directly
    // SubLord = Rahu/Ketu    → apply 4-rule priority check on SubLord
    // StarLord = Rahu/Ketu   → apply 4-rule priority check on StarLord
    // Deny houses completely ignored — only promiseH matters for YES/NO
    var promiseHouses = topic.promiseH;
    var rahuKetuRuleInfo = null;
    var cslStarSigs = [];
    var promiseHit = [];
    var hasPromise = false;

    function applyRKCheck(rkPl) {
      // First check Rahu/Ketu own houses
      getPlanetAllSigs(rkPl).forEach(function(h){
        if(cslStarSigs.indexOf(h)===-1) cslStarSigs.push(h);
      });
      promiseHit = promiseHouses.filter(function(h){return cslStarSigs.indexOf(h)!==-1;});
      if (promiseHit.length > 0) {
        hasPromise = true;
        rahuKetuRuleInfo = { pl: rkPl, rule: 0 };
        return;
      }
      // Apply 4 rules in priority order (1→2→3→4), stop at first match
      var rkCheck = rahuKetuPromiseCheck(rkPl, positions, promiseHouses, getPlanetAllSigs);
      if (rkCheck.connected) {
        hasPromise = true;
        rahuKetuRuleInfo = { pl: rkPl, rule: rkCheck.rule, planets: rkCheck.planets };
        rkCheck.planets.forEach(function(p){
          getPlanetAllSigs(p).forEach(function(h){
            if(cslStarSigs.indexOf(h)===-1) cslStarSigs.push(h);
          });
          promiseHouses.forEach(function(h){
            if(getPlanetAllSigs(p).indexOf(h)!==-1 && promiseHit.indexOf(h)===-1) promiseHit.push(h);
          });
        });
      }
    }

    if (csl === 7 || csl === 8) {
      // SubLord = Rahu/Ketu → apply 4-rule check on SubLord
      applyRKCheck(csl);
    } else if (cslStarLord === 7 || cslStarLord === 8) {
      // SubLord's StarLord = Rahu/Ketu → apply 4-rule check on StarLord
      applyRKCheck(cslStarLord);
    } else {
      // Normal planet → check StarLord houses directly
      getPlanetAllSigs(cslStarLord).forEach(function(h){
        if(cslStarSigs.indexOf(h)===-1) cslStarSigs.push(h);
      });
      promiseHit = promiseHouses.filter(function(h){return cslStarSigs.indexOf(h)!==-1;});
      hasPromise = promiseHit.length >= 1;
    }

    // starLordPlanets: for display only
    var starLordPlanets = [cslStarLord];

    // -- CONDITION 2: Characteristics ----------------------------------------
    // CSL rasi
    var cslRi = getPl_ri(csl);
    var cslRasi = RS_EN[cslRi];
    var cslElem = RASI_ELEM2_EN[cslRi];
    var cslType = RASI_TYPE_EN[cslRi]; // Movable/Fixed/Dual
    var cslGender = RASI_GENDER2_EN[cslRi];
    var cslCaste = RASI_CASTE_EN[cslRi];
    var cslDharma = RASI_DHARMA_EN[cslRi];
    var cslLegs = RASI_LEGS[cslRi];

    // CSL planet nature + all influencing planets (aspects + conjunctions)
    var cslInfluences = getPlanetInfluences(csl, positions);
    var cslAllPlanets = [csl].concat(cslInfluences); // CSL + all planets seeing/with CSL

    // CSL significations for characteristic description
    var cslSigs = getPlanetAllSigs(csl);

    // -- CONDITION 3: After result (post event life) --------------------------
    var cslSubLord = getPl_subl(csl);
    var cslSubSigs = cslSubLord !== null ? getPlanetAllSigs(cslSubLord) : [];
    // Expand if Rahu/Ketu
    if (cslSubLord === 7 || cslSubLord === 8) {
      var expSub = getRahuKetuConnections(cslSubLord, positions, cusps, lagnaRi);
      expSub.forEach(function(pl){
        getPlanetAllSigs(pl).forEach(function(h){
          if(cslSubSigs.indexOf(h)===-1) cslSubSigs.push(h);
        });
      });
    }
    // House quality scoring (love/material)
    // Inner 1,3,7,11: love=70, material=30
    // Outer 2,4,6,10: love=30, material=70
    // Special 5,9: love=100, material=0
    // Bad 8,12: negative
    var afterLoveScore=0, afterMatScore=0, afterBadCount=0, afterCount=0;
    cslSubSigs.forEach(function(h){
      if([1,3,7,11].indexOf(h)!==-1){afterLoveScore+=70;afterMatScore+=30;afterCount++;}
      else if([2,4,6,10].indexOf(h)!==-1){afterLoveScore+=30;afterMatScore+=70;afterCount++;}
      else if([5,9].indexOf(h)!==-1){afterLoveScore+=100;afterMatScore+=0;afterCount++;}
      else if([8,12].indexOf(h)!==-1){afterBadCount++;afterCount++;}
      else if(h===6){afterBadCount++;afterCount++;}
    });
    var afterLoveAvg = afterCount>0?Math.round(afterLoveScore/afterCount):0;
    var afterMatAvg = afterCount>0?Math.round(afterMatScore/afterCount):0;
    var afterOutcome = afterBadCount > afterCount/2 ? "troubled" : afterLoveAvg>=60?"loving":"balanced";

    // -- STEP 6: TIMING -------------------------------------------------------
    // Get all planets connected to promise houses L1/L2/L3/L4
    var houseSigsFull = getCombinedSigs(promiseHouses, positions, cusps, lagnaRi);

    // Enhanced Ruling Planets
    var rulingPlanets = getEnhancedRulingPlanets(positions, lagna, chartData, cusps, lagnaRi);

    // Common planets: house sigs that are also ruling planets, maintain L1>L2>L3>L4 order
    var commonPlanets = [];
    houseSigsFull.forEach(function(hs){
      // Expand Rahu/Ketu
      var expanded = expandRahuKetu(hs.pl);
      expanded.forEach(function(ep){
        if(rulingPlanets.indexOf(ep)!==-1){
          if(!commonPlanets.find(function(c){return c.pl===hs.pl;})){
            commonPlanets.push({pl:hs.pl, layer:hs.layer});
          }
        }
      });
    });

    // Dasa sequence and years
    var DASA_SEQ=[8,5,0,1,2,7,4,6,3];
    var DASA_YRS=[7,20,6,10,7,18,16,19,17];
    var TOTAL=120;
    var inp=chartData.input;
    var isKP249 = chartData.mode === "kp249";

    // For KP249: no birth details, use Gochara Moon for dasa calculation
    // moonPos from current chart positions (gochara moon when in kp249 mode)
    var moonPos=positions[1];
    var ni=moonPos.ni;
    var frac_elapsed = (moonPos.sidDeg*60 - ni*800) / 800;
    var dasaPl=NK[ni][2];
    var dasaSeqIdx=DASA_SEQ.indexOf(dasaPl);

    // For KP249: birthYr = today (gochara moon dasa starts from now)
    // For birth/gochara: birthYr = actual birth year
    var todayYr=new Date().getFullYear()+(new Date().getMonth())/12+(new Date().getDate())/365.25;
    var birthYr = isKP249
      ? todayYr
      : inp.year+(inp.month-1)/12+(inp.day-1)/365.25+(inp.utHr/24)/365.25;
    var dasaStartYr = isKP249
      ? todayYr - frac_elapsed * DASA_YRS[dasaSeqIdx]
      : birthYr - frac_elapsed * DASA_YRS[dasaSeqIdx];

    function yrToDate(yr){
      var y=Math.floor(yr);
      var rem=(yr-y)*365.25;
      var mo=Math.floor(rem/30.44)+1;
      var dy=Math.floor(rem%30.44)+1;
      if(mo>12)mo=12; if(dy>28)dy=28;
      return String(dy).padStart(2,'0')+"-"+String(mo).padStart(2,'0')+"-"+y;
    }

    // Workers in priority order (L1 first)
    var workers = commonPlanets.length > 0
      ? commonPlanets.map(function(c){return c.pl;})
      : houseSigsFull.map(function(c){return c.pl;}); // fallback

    // Deduplicate workers maintaining order
    var seenW=new Set(), uniqueWorkers=[];
    workers.forEach(function(p){if(!seenW.has(p)){seenW.add(p);uniqueWorkers.push(p);}});
    workers = uniqueWorkers;
    var wLen = workers.length;

    // Generate timing windows
    var windows = [];
    var pastWindows = [];

    // Walk dasa timeline
    var dasaTimeline=[];
    var dsScan=dasaStartYr;
    for(var si=0;si<72;si++){
      var siIdx=(dasaSeqIdx+si)%9, siPl=DASA_SEQ[siIdx], siYrs=DASA_YRS[siIdx];
      dasaTimeline.push({pl:siPl,start:dsScan,yrs:siYrs});
      dsScan+=siYrs;
      if(dsScan>todayYr+80) break;
    }

    // Find first dasa that starts at or after birth year

          if (!p || p.pl > 8 || p.pl === rkPl) return;
          getPlanetAspects(p.pl, p.sidDeg).forEach(function(aspDeg) {
            if (withinOrb(aspDeg, rkPos.sidDeg) && plHits(p.pl) && r3.indexOf(p.pl)===-1) r3.push(p.pl);
          });
        });
        if (r3.length > 0) return { connected: true, rule: 3, planets: r3 };
        var r4 = [];
        positions.forEach(function(p) {
          if (!p || p.pl > 8 || p.pl === rkPl) return;
          if (p.nl === rkPl && plHits(p.pl) && r4.indexOf(p.pl)===-1) r4.push(p.pl);
        });
        if (r4.length > 0) return { connected: true, rule: 4, planets: r4 };
        return { connected: false, rule: null, planets: [] };
      }

      function applyRKCheck2(rkPl) {
        // Check Rahu/Ketu own houses first
        var rkOwnH = getHouses(rkPl);
        var rkOwnMatch = promH2.filter(function(h){ return rkOwnH.indexOf(h) !== -1; });
        if (rkOwnMatch.length > 0) {
          cond2H = rkOwnH; cond2Match = rkOwnMatch;
          willHappen = true; rkRuleInfo2 = { pl: rkPl, rule: 0 }; return;
        }
        // Apply 4 rules in priority order
        var rc = rkPromiseCheck4Rules(rkPl);
        if (rc.connected) {
          rc.planets.forEach(function(p){ getHouses(p).forEach(function(h){ if(cond2H.indexOf(h)===-1) cond2H.push(h); }); });
          cond2Match = promH2.filter(function(h){ return cond2H.indexOf(h) !== -1; });
          willHappen = true; rkRuleInfo2 = { pl: rkPl, rule: rc.rule, planets: rc.planets };
        }
      }

      var cond2Match = promH2.filter(function(h){ return cond2H.indexOf(h) !== -1; });
      var willHappen = false;
      var rkRuleInfo2 = null;

      if (csl === 7 || csl === 8) {
        // SubLord = Rahu/Ketu → apply 4-rule check on SubLord
        applyRKCheck2(csl);
      } else if (starLord === 7 || starLord === 8) {
        // StarLord = Rahu/Ketu → apply 4-rule check on StarLord
        applyRKCheck2(starLord);
      } else {
        // Normal planet → check StarLord houses directly
        willHappen = cond2Match.length > 0;
      }
      var cslSubl   = cslPos ? cslPos.subl : null;
      var cslSublPos= (cslSubl!==null&&cslSubl!==undefined)?positions[cslSubl]:null;
      var afterStar = cslSublPos ? cslSublPos.nl : null;
      var cond3H    = getHouses(afterStar);

      var pN2  = function(pl){return pl===null||pl===undefined?"-":(isTA?(PL_TA[pl]||PL_EN[pl]):(PL_EN[pl]||"P"+pl));};
      var hList= function(arr){return arr.length?arr.map(function(h){return "H"+h;}).join(", "):"-";};
      var cS   = {background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"8px",padding:"10px 14px",marginBottom:"8px"};
      var hdrS = function(c){return {fontSize:"11px",fontWeight:700,color:c,marginBottom:"6px"};};

      return ce("div",{style:Object.assign({},S.card,{marginTop:"10px",borderTop:"2px solid #e8b84a33"})},
        ce("div",{style:{fontSize:"12px",color:LC.gold,fontWeight:700,marginBottom:"10px"}},
          "H"+mainH+" CSL: "+pN2(csl)+" | "+(isTA?"நட்சத்திர அதிபதி":"Star Lord")+": "+pN2(starLord)+" | "+(isTA?"உப-அதிபதி":"Sub Lord")+": "+pN2(cslSubl)),

        // Condition 1
        ce("div",{style:cS},
          ce("div",{style:hdrS("#88aaff")},
            "📌 "+(isTA?"நிலை 1 — குணம் / தன்மை (CSL வீடுகள்)":"Condition 1 — Character / Quality (CSL Houses)")),
          ce("div",{style:{fontSize:"12px",color:C.muted,marginBottom:"6px"}},

          ce("div",{style:{display:"flex",flexDirection:"column",gap:"3px"}},

          ),
          // Child gender — only if topic is child AND question mentions child
          (selQuery.id==="child"||selQuery.id==="child2"||selQuery.id==="child3") && csl!==null && (function(){
            var cslRasiIdx = cslPos ? cslPos.ri : null;
            var ownedRasiIdx = csl!==null ? RS_LORD.map(function(l,ri){return l===csl?ri:null;}).filter(function(x){return x!==null;}) : [];

            var isMale=maleCount>=femaleCount;

              ce("div",{style:{fontSize:"10px",color:C.muted}},
                (isTA?"CSL ராசி: ":"CSL Rasi: ")+(cslRasiIdx!==null?(isTA?RS_TA[cslRasiIdx]:RS_EN[cslRasiIdx]):"-")+
                " ("+(MALE_RASI.indexOf(cslRasiIdx)!==-1?(isTA?"ஆண்":"Male"):(isTA?"பெண்":"Female"))+")")
            );
          })()
        ),

        // Condition 2
        ce("div",{style:Object.assign({},cS,{border:"1px solid "+(willHappen?"#44ff8866":"#ff555566")})},
          ce("div",{style:hdrS(willHappen?"#44ff88":"#ff5555")},
            "📌 "+(isTA?"நிலை 2 — நடக்குமா? (CSL நட்சத்திர அதிபதி வீடுகள்)":"Condition 2 — Will It Happen? (CSL Star Lord Houses)")),

          ce("div",{style:{fontSize:"13px",fontWeight:700,color:willHappen?"#44ff88":"#ff5555"}},

              :(isTA?"❌ நடக்காது — வாக்கு வீட்டில் தொடர்பு இல்லை":"❌ Won't Happen — Star Lord not connected to promise houses")
          )
        ),

        // Condition 3
        ce("div",{style:cS},
          ce("div",{style:hdrS("#ffaa44")},
            "📌 "+(isTA?"நிலை 3 — நிகழ்வுக்கு பின் வாழ்க்கை":"Condition 3 — After Event Life")),
          ce("div",{style:{fontSize:"12px",color:C.muted,marginBottom:"6px"}},
            (isTA?"CSL உப-அதிபதி: ":"CSL Sub Lord: ")+pN2(cslSubl)+" → "+(isTA?"நட்சத்திர அதிபதி: ":"Star: ")+pN2(afterStar)+" → "+hList(cond3H)),
          ce("div",{style:{display:"flex",flexDirection:"column",gap:"3px"}},
            cond3H.map(function(h){

                isTA?BK_TA[h]:BK_EN[h]
              );
            })
          )
        )
      );
    })(),

    // Prediction result
    result && ce("div",{style:{marginTop:"10px"}},
      ce("div",{style:Object.assign({},S.card,{borderTop:"2px solid #e8b84a55"})},
        ce(SecHead,{icon:"[*]",
          txt:(isTA?"பலன்: ":"Result: ")+(isTA?result.topic.ta:result.topic.en),
          color:LC.gold}),
        result.empty
          ? ce("div",{style:{color:LC.grey,padding:"12px",fontSize:"12px"}},
              isTA?"தகவல் இல்லை":"No data available")
          : result.infertileBlock
          ? ce("div",{style:{background:C.bg1,borderRadius:"10px",padding:"16px",
              border:"1px solid #ff556655"}},
              ce("div",{style:{fontSize:"20px",marginBottom:"8px",textAlign:"center"}},"⚠️"),
              ce("div",{style:{color:"#ff5566",fontWeight:700,fontSize:"13px",
                textAlign:"center",marginBottom:"8px"}},
                isTA
                  ? (result.blockedAt==="1st"?"குழந்தை வரம்பு — 1 குழந்தை மட்டுமே"
                    :result.blockedAt==="2nd"?"குழந்தை வரம்பு — அதிகபட்சம் 2 குழந்தைகள்"
                    :"குழந்தை வரம்பு — அதிகபட்சம் 3 குழந்தைகள்")
                  : (result.blockedAt==="1st"?"Child Limit — 1 Child Only"
                    :result.blockedAt==="2nd"?"Child Limit — Maximum 2 Children"
                    :"Child Limit — Maximum 3 Children")),
              ce("div",{style:{color:"#ffaa44",fontSize:"12px",lineHeight:1.8,
                textAlign:"center"}}, result.msg),
              ce("div",{style:{marginTop:"12px",padding:"10px",background:C.bg5,
                borderRadius:"8px",fontSize:"11px",color:C.muted,textAlign:"center"}},
                isTA
                  ? "KP ஜோதிட விதி: மலட்டு ராசி (மேஷம், ரிஷபம், சிம்மம்) — இந்த ராசியில் CSL இருந்தால் அது கடைசி குழந்தையை குறிக்கும். மேலும் குழந்தை இல்லை என்பது இந்த விதியின் சாரம். திருமணம், தந்தை போன்ற கேள்விகளுக்கு இந்த விதி பொருந்தாது."
                  : "KP Rule: Infertile rasi (Aries, Taurus, Leo) — when a bhava CSL falls in these rasis, it indicates the last child. This rule applies only for child queries. Marriage, father, and other topics are not affected by this."
              )
            )
          : renderResult(result, isTA, PL_EN, PL_TA, RS_EN, RS_TA)
      )
    )
  );
}

// Input form for KP Lookup (Prasanam) - 2 steps: question first, then number

// ============================================================
// PrasnamChat — KP Analysis (no AI chat — deploy version)
// ============================================================
// Planet colors for Technique 1
var PL_COLORS_EN = ["Orange / Red","Grey","Dark Red","Green","Yellow / Gold","White","Blue / Black","Wood / Shiny","Violet / Purple"];
var PL_COLORS_TA = ["ஆரஞ்சு / சிவப்பு","சாம்பல்","அடர் சிவப்பு","பச்சை","மஞ்சள் / தங்க நிறம்","வெண்மை","நீலம் / கருப்பு","மர நிறம் / ஒளிரும் நிறம்","ஊதா நிறம்"];
var PL_COLORS_HEX = ["#ff6600","#999999","#aa1100","#22bb44","#ffcc00","#f5f5f5","#223366","#8b7355","#8833cc"];

function PrasnamChat(props) {
  useTheme();
  var lang = props.lang, isTA = lang === "ta";
  var data = props.data, topic = props.topic, question = props.question;
  var lagRiP = props.lagRiP;

  var positions = data.positions || [];
  var cusps     = data.cusps || [];

  // ---- House sig helpers ----
  function getDirectH(pl) {
    if (pl === null || pl === undefined || !positions[pl]) return [];
    var p = positions[pl];
    var occ = ((p.ri - lagRiP + 12) % 12) + 1;
    var owned = RS_LORD.map(function(l,ri){ return l===pl?((ri-lagRiP+12)%12)+1:null; }).filter(Boolean);
    return Array.from(new Set([occ].concat(owned))).sort(function(a,b){return a-b;});
  }
  function getFullH(pl) {
    if (pl === null || pl === undefined || !positions[pl]) return [];
    var p = positions[pl];
    var occ = ((p.ri - lagRiP + 12) % 12) + 1;
    var owned = RS_LORD.map(function(l,ri){ return l===pl?((ri-lagRiP+12)%12)+1:null; }).filter(Boolean);
    var nlH  = (p.nl!==undefined&&p.nl!==null&&positions[p.nl]) ? ((positions[p.nl].ri-lagRiP+12)%12)+1 : null;
    var nlOwn = (p.nl!==undefined&&p.nl!==null) ? RS_LORD.map(function(l,ri){return l===p.nl?((ri-lagRiP+12)%12)+1:null;}).filter(Boolean) : [];
    var all = [occ].concat(owned);
    if(nlH) all.push(nlH);
    all = all.concat(nlOwn);
    return Array.from(new Set(all)).sort(function(a,b){return a-b;});
  }

  var sn = function(pl){ return (pl===null||pl===undefined) ? "-" : (isTA?(PL_TA[pl]||PL_EN[pl]):(PL_EN[pl]||("P"+pl))); };
  var snEn = function(pl){ return (pl===null||pl===undefined) ? "-" : (PL_EN[pl]||("P"+pl)); };

  // H1 cusp sublord and star
  var h1Cusp   = cusps[0];
  var h1Subl   = h1Cusp ? h1Cusp.subl : null;
  var h1SubPos = (h1Subl!==null&&h1Subl!==undefined) ? positions[h1Subl] : null;
  var h1StarPl = h1SubPos ? h1SubPos.nl : null;
  var h1SubRi  = h1SubPos ? h1SubPos.ri : null;

  // Main house CSL — for Condition 2 (promise check)
  // Uses topic.mainHouse CSL Star Lord (NOT H1 Star Lord)
  // e.g. Marriage → H7 CSL Star Lord, Job → H6 CSL Star Lord
  var mainHouseIdx = topic ? (topic.mainHouse || 1) - 1 : 0;
  var mainHCusp    = cusps[mainHouseIdx] || cusps[0];
  var mainHCsl     = mainHCusp ? mainHCusp.subl : null;
  var mainHCslPos  = (mainHCsl!==null&&mainHCsl!==undefined) ? positions[mainHCsl] : null;
  var mainHStarPl  = mainHCslPos ? mainHCslPos.nl : null;

  // ══════════════════════════════════════════════════════
  // TECHNIQUE 1 — COLOR FINDER
  // ══════════════════════════════════════════════════════
  if (topic && topic.isColor) {
    var dominantColor = (h1Subl!==null&&h1Subl!==undefined&&h1Subl<9) ? h1Subl : null;
    var secondaryColor = (h1StarPl!==null&&h1StarPl!==undefined&&h1StarPl<9) ? h1StarPl : null;
    return ce("div",{style:{background:C.bg0,border:"1px solid "+C.bdr,borderRadius:"10px",padding:"14px",marginTop:"10px"}},
      question && ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"7px",padding:"10px 14px",marginBottom:"12px"}},
        ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:700,marginBottom:"4px"}},"🎨 "+(isTA?"நிறம் கேள்வி":"COLOR QUESTION")),
        ce("div",{style:{color:C.txt,fontSize:"14px"}}, question)
      ),
      ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}},
        // Dominant color
        dominantColor!==null && (function(){
          var hex = PL_COLORS_HEX[dominantColor];
          var isLight = dominantColor === 5; // Venus = white
          var textColor = isLight ? (C._dark ? "#cccccc" : "#555555") : hex;
          var circleBorder = isLight ? "2px solid #cccccc" : "none";
          return ce("div",{style:{background:C.bg1,border:"2px solid "+hex+(isLight?"88":"66"),
            borderRadius:"10px",padding:"14px",textAlign:"center"}},
            ce("div",{style:{width:"48px",height:"48px",borderRadius:"50%",
              background:hex, border:circleBorder, margin:"0 auto 10px",
              boxShadow:"0 4px 16px "+(isLight?"#aaaaaa88":hex+"88")}}),
            ce("div",{style:{color:C.acc,fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"4px"}},
              isTA?"முதல் நிறம் (உப-அதிபதி)":"DOMINANT (Sub Lord)"),
            ce("div",{style:{color:textColor,fontWeight:800,fontSize:"16px",
              textShadow:isLight?"none":"0 0 10px "+hex}},
              isTA?PL_COLORS_TA[dominantColor]:PL_COLORS_EN[dominantColor]),
            ce("div",{style:{color:C.muted,fontSize:"11px",marginTop:"4px"}},

              ce("span",{style:{color:C.acc2,fontWeight:600}}, sn(dominantColor)))
          );
        })(),
        // Secondary color
        secondaryColor!==null && (function(){
          var hex2 = PL_COLORS_HEX[secondaryColor];
          var isLight2 = secondaryColor === 5;
          var textColor2 = isLight2 ? (C._dark ? "#cccccc" : "#555555") : hex2;
          var circleBorder2 = isLight2 ? "2px solid #cccccc" : "none";
          return ce("div",{style:{background:C.bg1,border:"1px solid "+hex2+(isLight2?"55":"44"),
            borderRadius:"10px",padding:"14px",textAlign:"center"}},
            ce("div",{style:{width:"36px",height:"36px",borderRadius:"50%",
              background:hex2, border:circleBorder2, margin:"0 auto 10px",opacity:0.9}}),
            ce("div",{style:{color:C.muted,fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"4px"}},
              isTA?"இரண்டாம் நிறம் (நட்சத்திர அதிபதி)":"SECONDARY (Star Lord)"),
            ce("div",{style:{color:textColor2,fontWeight:700,fontSize:"14px"}},
              isTA?PL_COLORS_TA[secondaryColor]:PL_COLORS_EN[secondaryColor]),
            ce("div",{style:{color:C.muted,fontSize:"11px",marginTop:"4px"}},
              isTA?"கிரகம்: ":"Planet: ",
              ce("span",{style:{color:C.acc2,fontWeight:600}}, sn(secondaryColor)))
          );
        })()
      ),
      ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"8px",padding:"8px 12px",fontSize:"11px",color:C.muted}},
        isTA
          ?"உப-அதிபதி = முதன்மை நிறம் | நட்சத்திர அதிபதி = இரண்டாம் நிறம் (கோச்சாரத்தில் மாறும்)"
          :"Sub Lord = Dominant color | Star Lord = Secondary color (changes with Gochara)"
      )
    );
  }

  // ══════════════════════════════════════════════════════
  // TECHNIQUE 2 — WHO WINS (Probability)
  // ══════════════════════════════════════════════════════
  if (topic && topic.isProbability) {
    // Sub Lord sign: odd(male)=Option1, even(female)=Option2
    var isOddSign = h1SubRi !== null ? (h1SubRi % 2 === 0) : null; // ri 0=Aries(odd), 1=Taurus(even)
    var winnerOption = isOddSign===null ? null : (isOddSign ? 1 : 2);
    var winnerColor  = winnerOption===1 ? "#44aaff" : "#ff88cc";
    var RASI_NAME = function(ri){ return isTA ? RS_TA[ri] : RS_EN[ri]; };
    return ce("div",{style:{background:C.bg0,border:"1px solid "+C.bdr,borderRadius:"10px",padding:"14px",marginTop:"10px"}},
      question && ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"7px",padding:"10px 14px",marginBottom:"12px"}},
        ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:700,marginBottom:"4px"}},"🎯 "+(isTA?"யார் வெல்வார்?":"WHO WINS?")),
        ce("div",{style:{color:C.txt,fontSize:"14px"}}, question)
      ),
      winnerOption!==null && ce("div",{style:{textAlign:"center",padding:"20px",
        background:C.bg1,border:"2px solid "+winnerColor+"66",borderRadius:"12px",marginBottom:"14px"}},
        ce("div",{style:{fontSize:"48px",marginBottom:"8px"}}, winnerOption===1?"🏆1️⃣":"🏆2️⃣"),
        ce("div",{style:{color:winnerColor,fontWeight:800,fontSize:"22px",marginBottom:"6px"}},
          isTA
            ?"விருப்பம் "+(winnerOption===1?"1":"2")+" வெல்லும்"
            :"Option "+(winnerOption===1?"1":"2")+" Wins"),
        ce("div",{style:{color:C.muted,fontSize:"12px"}},
          isTA?"உப-அதிபதி ":"Sub Lord: ",
          ce("span",{style:{color:C.acc2,fontWeight:700}}, sn(h1Subl)),
          " — ",
          h1SubRi!==null ? RASI_NAME(h1SubRi) : "",
          " (",isOddSign?(isTA?"ஆண் ராசி":"Male Sign"):(isTA?"பெண் ராசி":"Female Sign"),")"
        )
      ),
      ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}},
        ce("div",{style:{padding:"12px",background:winnerOption===1?"rgba(68,170,255,0.1)":C.bg1,
          border:"2px solid "+(winnerOption===1?"#44aaff":"#333355"),
          borderRadius:"8px",textAlign:"center"}},
          ce("div",{style:{fontSize:"20px",marginBottom:"4px"}},"1️⃣"),
          ce("div",{style:{color:winnerOption===1?"#44aaff":C.muted,fontWeight:winnerOption===1?700:400,fontSize:"13px"}},
            isTA?"விருப்பம் 1":"Option 1"),
          ce("div",{style:{fontSize:"10px",color:C.muted,marginTop:"2px"}},
            isTA?"(ஆண் ராசி)":"(Male Sign)")
        ),
        ce("div",{style:{padding:"12px",background:winnerOption===2?"rgba(255,136,204,0.1)":C.bg1,
          border:"2px solid "+(winnerOption===2?"#ff88cc":"#333355"),
          borderRadius:"8px",textAlign:"center"}},
          ce("div",{style:{fontSize:"20px",marginBottom:"4px"}},"2️⃣"),
          ce("div",{style:{color:winnerOption===2?"#ff88cc":C.muted,fontWeight:winnerOption===2?700:400,fontSize:"13px"}},
            isTA?"விருப்பம் 2":"Option 2"),
          ce("div",{style:{fontSize:"10px",color:C.muted,marginTop:"2px"}},
            isTA?"(பெண் ராசி)":"(Female Sign)")
        )
      ),
      ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"8px",padding:"8px 12px",fontSize:"11px",color:C.muted}},
        isTA
          ?"ஆண் ராசி (ஒற்றை) = விருப்பம் 1 | பெண் ராசி (இரட்டை) = விருப்பம் 2"
          :"Male/Odd sign = Option 1 | Female/Even sign = Option 2"
      )
    );
  }

  // ══════════════════════════════════════════════════════
  // TECHNIQUE 4 — WHEN WILL IT HAPPEN (24hr timing)
  // ══════════════════════════════════════════════════════
  // Method: Find when Star Lord and Sub Lord are in TRINE (120°) aspect
  // 1° = 4 minutes of clock time
  // Check both combos: StarL→SubL and SubL→StarL (reverse)
  if (topic && topic.isTiming) {
    // Star Lord = nl of H1 SubLord's position
    // Sub Lord  = H1 SubLord itself
    // (We do NOT use Sub's Sub — only these two)
    var timingStarPl  = h1StarPl;
    var timingSubPl   = h1Subl;
    var timingStarPos = (timingStarPl!==null&&timingStarPl!==undefined) ? positions[timingStarPl] : null;
    var timingSubPos  = (timingSubPl!==null&&timingSubPl!==undefined)   ? positions[timingSubPl]  : null;

    // Absolute sidereal degrees (0–360) of each planet
    var starAbsDeg = timingStarPos ? timingStarPos.sidDeg : null;
    var subAbsDeg  = timingSubPos  ? timingSubPos.sidDeg  : null;

    // Degree within sign (0–30) for display
    var starInSign = starAbsDeg !== null ? (starAbsDeg % 30) : null;
    var subInSign  = subAbsDeg  !== null ? (subAbsDeg  % 30) : null;

    // Sign names for display
    var starSignName = timingStarPos ? RS_EN[timingStarPos.ri] : "";
    var subSignName  = timingSubPos  ? RS_EN[timingSubPos.ri]  : "";

    // ── CORE CALCULATION ────────────────────────────────
    // We need to find how many degrees separate them so that
    // they form a 120° trine.
    //
    // Combo 1 (StarL → SubL):
    //   Target = StarL absolute deg + 120°
    //   Gap    = (Target - SubL absolute deg + 360) % 360
    //   This gap tells us: SubL needs to travel this many degrees
    //   to reach the trine point of StarL.
    //   Minutes = gap × 4
    //
    // Combo 2 (SubL → StarL) — reverse:
    //   Target = SubL absolute deg + 120°
    //   Gap    = (Target - StarL absolute deg + 360) % 360
    //   Minutes = gap × 4

    function calcTrineMins(fromDeg, toDeg) {
      if (fromDeg === null || toDeg === null) return null;
      // How far does 'toDeg' need to travel to reach (fromDeg + 120)?
      var target = (fromDeg + 120) % 360;
      var gap    = (target - toDeg + 360) % 360;
      return Math.round(gap * 4); // 1° = 4 minutes
    }

    // Combo 1: StarL → SubL  (StarL is the reference, SubL reaches its trine)
    var mins1 = calcTrineMins(starAbsDeg, subAbsDeg);
    // Combo 2: SubL → StarL  (reverse — SubL is reference, StarL reaches its trine)
    var mins2 = calcTrineMins(subAbsDeg,  starAbsDeg);

    // Current time in minutes from midnight
    var now     = new Date();
    var nowMins = now.getHours() * 60 + now.getMinutes();

    function addMins(base, add) {
      var total = (base + add) % 1440;
      var h = Math.floor(total / 60);
      var m = total % 60;
      return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
    }

    function minsToHM(m) {
      return Math.floor(m/60)+"h "+m%60+"m";
    }

    var time1 = (mins1 !== null) ? addMins(nowMins, mins1) : null;
    var time2 = (mins2 !== null) ? addMins(nowMins, mins2) : null;

    // ── Step-by-step breakdown for display ──────────────
    // Combo 1 breakdown
    var target1 = (starAbsDeg !== null) ? ((starAbsDeg + 120) % 360).toFixed(2) : null;
    var gap1Deg  = (mins1 !== null) ? (mins1 / 4).toFixed(2) : null;
    // Combo 2 breakdown
    var target2 = (subAbsDeg !== null) ? ((subAbsDeg + 120) % 360).toFixed(2) : null;
    var gap2Deg  = (mins2 !== null) ? (mins2 / 4).toFixed(2) : null;

    // Sign-by-sign degree breakdown for combo 1 (for display like your example)
    function signBySignBreakdown(fromDeg, toDeg) {
      if (fromDeg===null||toDeg===null) return null;
      var target  = (fromDeg + 120) % 360;
      var fromRi  = Math.floor(fromDeg / 30) % 12;
      var toRi    = Math.floor(toDeg  / 30) % 12;
      var targetRi= Math.floor(target  / 30) % 12;
      // Degrees remaining in from-planet's sign
      var rem1 = 30 - (fromDeg % 30);
      // Full signs between from and target
      var lines = [];
      lines.push(RS_EN[fromRi] + " remaining: " + rem1.toFixed(2) + "°");
      var ri = (fromRi + 1) % 12;
      var acc = rem1;
      while (ri !== targetRi) {
        lines.push(RS_EN[ri] + " (full): 30.00°");
        acc += 30;
        ri = (ri + 1) % 12;
      }
      var lastPart = target % 30;
      lines.push(RS_EN[targetRi] + " up to target: " + lastPart.toFixed(2) + "°");
      acc += lastPart;
      lines.push("Total: " + acc.toFixed(2) + "° × 4 = " + Math.round(acc*4) + " mins");
      return lines;
    }

    var breakdown1 = (starAbsDeg!==null && subAbsDeg!==null) ? signBySignBreakdown(starAbsDeg, subAbsDeg) : null;
    var breakdown2 = (subAbsDeg!==null && starAbsDeg!==null) ? signBySignBreakdown(subAbsDeg,  starAbsDeg) : null;

    return ce("div",{style:{background:C.bg0,border:"1px solid "+C.bdr,borderRadius:"10px",padding:"14px",marginTop:"10px"}},

      // Question header
      question && ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"7px",padding:"10px 14px",marginBottom:"12px"}},
        ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:700,marginBottom:"4px"}},
          "⏰ "+(isTA?"எப்போது? (24 மணி நேரம்)":"WHEN? (24hr Timing)")),
        ce("div",{style:{color:C.txt,fontSize:"14px"}}, question)
      ),

      // Star Lord + Sub Lord cards
      ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"8px",padding:"10px 14px",marginBottom:"12px"}},
        ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:700,marginBottom:"8px",letterSpacing:"1px"}},
          isTA?"நட்சத்திர அதிபதி + உப-அதிபதி (திரிகோண முறை 120°)":"STAR LORD + SUB LORD (Trine Method 120°)"),
        ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
          ce("div",{style:{background:C.bg4,borderRadius:"7px",padding:"10px",textAlign:"center"}},
            ce("div",{style:{color:C.muted,fontSize:"10px",marginBottom:"4px"}},
              isTA?"நட்சத்திர அதிபதி (NL)":"Star Lord (NL)"),
            ce("div",{style:{color:C.acc2,fontWeight:800,fontSize:"16px"}}, sn(timingStarPl)),
            timingStarPos && ce("div",{style:{color:C.muted,fontSize:"10px",marginTop:"2px"}},
              fmtDMS(starAbsDeg)+" "+starSignName),
            starInSign!==null && ce("div",{style:{color:"#44ff88",fontSize:"10px",marginTop:"2px",fontWeight:700}},
              (isTA?"ராசியில்: ":"In sign: ")+starInSign.toFixed(2)+"°")
          ),
          ce("div",{style:{background:C.bg4,borderRadius:"7px",padding:"10px",textAlign:"center"}},
            ce("div",{style:{color:C.muted,fontSize:"10px",marginBottom:"4px"}},
              isTA?"உப-அதிபதி (SubL)":"Sub Lord (SubL)"),
            ce("div",{style:{color:C.acc2,fontWeight:800,fontSize:"16px"}}, sn(timingSubPl)),
            timingSubPos && ce("div",{style:{color:C.muted,fontSize:"10px",marginTop:"2px"}},
              fmtDMS(subAbsDeg)+" "+subSignName),
            subInSign!==null && ce("div",{style:{color:"#44ff88",fontSize:"10px",marginTop:"2px",fontWeight:700}},
              (isTA?"ராசியில்: ":"In sign: ")+subInSign.toFixed(2)+"°")
          )
        )
      ),

      // Calculation breakdown — Combo 1
      ce("div",{style:{background:C.bg1,border:"1px solid #44ff8833",borderRadius:"8px",padding:"10px 14px",marginBottom:"10px"}},
        ce("div",{style:{color:"#44ff88",fontSize:"11px",fontWeight:700,marginBottom:"6px",letterSpacing:"1px"}},
          isTA?"கணக்கீடு 1: NL → SubL திரிகோணம்":"CALC 1: NL → SubL Trine"),
        ce("div",{style:{fontFamily:"monospace",fontSize:"10px",color:C.muted,lineHeight:1.8}},
          starAbsDeg!==null && ce("div",null, sn(timingStarPl)+" abs: "+starAbsDeg.toFixed(2)+"° ("+starSignName+")"),
          target1 && ce("div",{style:{color:C.txt}}, "Target (NL+120°): "+target1+"°"),
          subAbsDeg!==null && ce("div",null, sn(timingSubPl)+" abs: "+subAbsDeg.toFixed(2)+"° ("+subSignName+")"),
          gap1Deg && ce("div",{style:{color:"#44ff88",fontWeight:700}}, "Gap: "+gap1Deg+"° × 4 = "+mins1+" mins"),
          breakdown1 && ce("div",{style:{marginTop:"6px",borderTop:"1px solid "+C.bdr,paddingTop:"6px"}},
            breakdown1.map(function(line,i){
              return ce("div",{key:i,style:{color:line.indexOf("Total")===0?"#44ff88":C.muted}}, line);
            })
          )
        )
      ),

      // Calculation breakdown — Combo 2
      ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdrGold+"55",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px"}},
        ce("div",{style:{color:C.acc2,fontSize:"11px",fontWeight:700,marginBottom:"6px",letterSpacing:"1px"}},
          isTA?"கணக்கீடு 2: SubL → NL திரிகோணம் (தலைகீழ்)":"CALC 2: SubL → NL Trine (Reverse)"),
        ce("div",{style:{fontFamily:"monospace",fontSize:"10px",color:C.muted,lineHeight:1.8}},
          subAbsDeg!==null && ce("div",null, sn(timingSubPl)+" abs: "+subAbsDeg.toFixed(2)+"° ("+subSignName+")"),
          target2 && ce("div",{style:{color:C.txt}}, "Target (SubL+120°): "+target2+"°"),
          starAbsDeg!==null && ce("div",null, sn(timingStarPl)+" abs: "+starAbsDeg.toFixed(2)+"° ("+starSignName+")"),
          gap2Deg && ce("div",{style:{color:C.acc2,fontWeight:700}}, "Gap: "+gap2Deg+"° × 4 = "+mins2+" mins"),
          breakdown2 && ce("div",{style:{marginTop:"6px",borderTop:"1px solid "+C.bdr,paddingTop:"6px"}},
            breakdown2.map(function(line,i){
              return ce("div",{key:i,style:{color:line.indexOf("Total")===0?C.acc2:C.muted}}, line);
            })
          )
        )
      ),

      // Final time predictions
      ce("div",{style:{color:C.acc,fontSize:"11px",fontWeight:700,letterSpacing:"1px",marginBottom:"8px"}},
        isTA?"சாத்தியமான நேரங்கள் (இன்றைய தேதி)":"PREDICTED TIMES (Today)"),
      ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}},
        time1 && ce("div",{style:{background:"rgba(68,255,136,0.08)",border:"1px solid #44ff8844",
          borderRadius:"10px",padding:"14px",textAlign:"center"}},
          ce("div",{style:{color:C.muted,fontSize:"10px",marginBottom:"4px",fontWeight:700}},
            sn(timingStarPl)+" → "+sn(timingSubPl)),
          ce("div",{style:{color:"#44ff88",fontWeight:800,fontSize:"28px",fontFamily:"monospace"}}, time1),
          ce("div",{style:{color:C.muted,fontSize:"10px",marginTop:"4px"}},
            "("+minsToHM(mins1)+" "+(isTA?"இப்போதில் இருந்து":"from now")+")")
        ),
        time2 && ce("div",{style:{background:"rgba(200,150,42,0.08)",border:"1px solid "+C.bdrGold,
          borderRadius:"10px",padding:"14px",textAlign:"center"}},
          ce("div",{style:{color:C.muted,fontSize:"10px",marginBottom:"4px",fontWeight:700}},
            sn(timingSubPl)+" → "+sn(timingStarPl)+" "+(isTA?"(தலைகீழ்)":"(Reverse)")),
          ce("div",{style:{color:C.acc2,fontWeight:800,fontSize:"28px",fontFamily:"monospace"}}, time2),
          ce("div",{style:{color:C.muted,fontSize:"10px",marginTop:"4px"}},
            "("+minsToHM(mins2)+" "+(isTA?"இப்போதில் இருந்து":"from now")+")")
        )
      ),

      // Footer note
      ce("div",{style:{background:C.bg1,border:"1px solid "+C.bdr,borderRadius:"8px",
        padding:"8px 12px",fontSize:"11px",color:C.muted,lineHeight:1.7}},
        ce("div",null, "🔺 "+(isTA
          ?"திரிகோண கோணம் (120°) = நட்சத்திர அதிபதி மற்றும் உப-அதிபதி ஒன்றாக சேரும் நேரம்"
          :"Trine angle (120°) = when Star Lord & Sub Lord come into union")),
        ce("div",null, "📐 1° = 4 "+(isTA?"நிமிடங்கள்":"minutes")+" | "+(isTA
          ?"இரண்டு நேரமும் செல்லுபடியாகும் — இரண்டையும் கவனியுங்கள்"
          :"Both times are valid — observe both"))
      )
    );
  }

  // ══════════════════════════════════════════════════════
  // TECHNIQUE 5 — LOST ITEM LOCATION
  // ══════════════════════════════════════════════════════
  if (topic && topic.isLostItem) {
    var sunPos    = positions[0];
    var sunRi     = sunPos ? sunPos.ri : null;
    var sunHouse  = sunRi!==null ? ((sunRi - lagRiP + 12) % 12) + 1 : null;
    var sublHouse = h1SubPos ? ((h1SubPos.ri - lagRiP + 12) % 12) + 1 : null;
    var pieceFromSun = (sublHouse!==null && sunHouse!==null)
      ? ((sublHouse - sunHouse + 12) % 12) + 1
      : null;
    var sublDeg = h1SubPos ? (h1SubPos.sidDeg % 30) : null;
    var heightZone = sublDeg!==null
      ? (sublDeg < 10 ? (isTA?"கீழ் பகுதி (0-10°)":"Lower section (0-10°)")
       : sublDeg < 20 ? (isTA?"நடு பகுதி (10-20°)":"Middle section (10-20°)")
       :                (isTA?"மேல் பகுதி (20-30°)":"Upper section (20-30°)"))
      : null;
    var isRetro = h1SubPos ? h1SubPos.retro : false;

    // H1=entrance(Sun), sublHouse=item location
    // Clockwise grid: H1(bottom-left entrance) → H12,H11,H10(bottom) → H9,H8(right up) → H7,H6,H5,H4(top) → H3,H2(left down)
    function houseCell(h) {
      var isEntrance = h === 1;
      var isTarget   = sublHouse !== null && h === sublHouse;
      var bg   = isTarget ? "rgba(68,255,136,0.25)"  : isEntrance ? "rgba(200,150,42,0.15)" : C.bg4;
      var bdr3 = isTarget ? "2px solid #44ff88"       : isEntrance ? "2px solid "+C.acc      : "1px solid "+C.bdr;
      var col  = isTarget ? "#44ff88"                 : isEntrance ? C.acc2                  : C.muted;
      return ce("td",{key:"h"+h,style:{
        width:"52px",height:"52px",border:bdr3,background:bg,
        textAlign:"center",verticalAlign:"middle",padding:"2px"
      }},
        ce("div",{style:{fontSize:"11px",fontWeight:700,color:col}},
          "H"+h+(isEntrance?" 🚪":"")+(isTarget?" 📍":""))
      );
    }

    var roomGrid = ce("table",{style:{borderCollapse:"collapse",margin:"0 auto"}},
      ce("tbody",null,
        // Row 0 top (far wall): H4 H5 H6 H7
        ce("tr",null, [4,5,6,7].map(houseCell)),
        // Row 1: H3 [center 2x2] H8
        ce("tr",null,
          houseCell(3),
          ce("td",{rowSpan:2,colSpan:2,style:{
            width:"104px",height:"104px",border:"1px solid "+C.bdr,

    )
  );
}
// --- SAVE / SHARE via URL hash -------------------------------------------
function encodeChart(input) {
  try {
    var data = {
      n: input.name||"",
      g: input.gender||"male",
      d: input.day, mo: input.month, y: input.year,
      h: input.hour, mi: input.minute, s: input.second||0,
      la: input.lat, lo: input.lon,
      p: input.place||""
    };
    return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  } catch(e) { return ""; }
}

function decodeChart(hash) {
  try {
    var raw = hash.replace(/^#/,"");
    if (!raw || raw.length < 10) return null;
    var data = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (!data.y || !data.d || !data.mo) return null;
    var istHr = (data.h||0) + (data.mi||0)/60 + (data.s||0)/3600;
    return {
      name: data.n||"", gender: data.g||"male",
      day: data.d, month: data.mo, year: data.y,
      hour: data.h||0, minute: data.mi||0, second: data.s||0,
      utHr: istHr - 5.5,
      lat: data.la||13.0827, lon: data.lo||80.2707,
      place: data.p||""
    };
  } catch(e) { return null; }
}

// ── D2 Hora
function getHoraRasi(sidDeg) {
  var ri = Math.floor(sidDeg / 30) % 12;
  var inSign = sidDeg % 30;
  var isOdd = ri % 2 === 0; // 0=Aries(odd),1=Taurus(even)...
  if (isOdd) return inSign < 15 ? 4 : 3;   // Leo=4, Cancer=3
  else        return inSign < 15 ? 3 : 4;
}

// ── D3 Drekkana — Method 1: Parasara "Same → 5th → 9th" rule
// 0°–10°  → same sign (k=0: +0)
// 10°–20° → 5th sign  (k=1: +4 signs, i.e. 4 steps from same sign = 5th sign)
// 20°–30° → 9th sign  (k=2: +8 signs, i.e. 8 steps from same sign = 9th sign)
function getDrekkanaParasaraRasi(sidDeg) {
  var ri = Math.floor(sidDeg / 30) % 12;
  var k  = Math.floor((sidDeg % 30) / 10); // 0,1,2
  return (ri + k * 4) % 12;
}

// ── D3 Drekkana — Method 2: Jaimini Element/Trine method
// Fire  signs (Ar=0, Le=4, Sa=8)  → trine order: 0→0, 1→4, 2→8
// Earth signs (Ta=1, Vi=5, Cp=9)  → trine order: 0→1, 1→5, 2→9
// Air   signs (Ge=2, Li=6, Aq=10) → trine order: 0→2, 1→6, 2→10
// Water signs (Cn=3, Sc=7, Pi=11) → trine order: 0→3, 1→7, 2→11
// In all cases: result = (element_base + k*4) % 12
// element_base = ri % 4  (0=fire,1=earth,2=air,3=water)
// Note: gives identical result to Parasara method ✓
function getDrekkanaJaiminiRasi(sidDeg) {
  var ri   = Math.floor(sidDeg / 30) % 12;
  var k    = Math.floor((sidDeg % 30) / 10); // 0,1,2
  var base = ri % 4; // element base: 0=Ar,1=Ta,2=Ge,3=Cn
  return (base + k * 4) % 12;
}

// Default D3 uses Parasara method
function getDrekkanaRasi(sidDeg) { return getDrekkanaParasaraRasi(sidDeg); }

// ── D9 Navamsa — THE CORRECT Parasara formula
// Each sign has 9 navamsas of 3°20' each.
// Start sign for each rasi (NAV_START):
//   Fire signs (Ar,Le,Sa = 0,4,8)  → start from Aries(0)
//   Earth signs(Ta,Vi,Cp = 1,5,9)  → start from Capricorn(9)
//   Air signs (Ge,Li,Aq = 2,6,10)  → start from Libra(6)
//   Water signs(Cn,Sc,Pi = 3,7,11) → start from Cancer(3)
var D9_START = [0,9,6,3, 0,9,6,3, 0,9,6,3];
function getNavamsaRasiCorrect(sidDeg) {
  var ri     = Math.floor(sidDeg / 30) % 12;
  var inSign = sidDeg % 30;
  var seg    = Math.min(Math.floor(inSign / (30/9)), 8); // 0-8
  return (D9_START[ri] + seg) % 12;
}

// ── D12 Dwadasamsa — starts from sign itself, both odd and even
function getDwadasamsaRasi(sidDeg) {
  var ri   = Math.floor(sidDeg / 30) % 12;
  var part = Math.min(Math.floor((sidDeg % 30) / 2.5), 11);
  return (ri + part) % 12;
}

// ── D60 Shashtiamsa — 60 parts of 0°30' each
// Odd signs:  count starts from the sign itself       (ri + part)
// Even signs: count starts from the 9th sign away     ((ri+8) + part)
function getShashtiamsaRasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / 0.5), 59);
  var isOdd = ri % 2 === 0;
  var start = isOdd ? ri : (ri + 8) % 12;
  return (start + part) % 12;
}

// ── Generic varga (D4,5,6,7,8,10,11,16,20,24,27,30,40,45)
// oddStart  = where part-0 maps to for odd signs
// evenStart = where part-0 maps to for even signs (null = sign itself)
// D5 lookup tables — Thirukanidham / traditional mapping (non-sequential)
// Male/Odd signs:   Aries→Aquarius→Sag→Gemini→Libra
// Female/Even signs: Taurus→Virgo→Pisces→Cap→Scorpio
var D5_ODD_MAP  = [0, 10, 8, 2, 6];
var D5_EVEN_MAP = [1,  5, 11, 9, 7];

function getD5Rasi(sidDeg) {
  var ri   = Math.floor(sidDeg / 30) % 12;
  var part = Math.min(Math.floor((sidDeg % 30) / 6), 4);
  return (ri % 2 === 0) ? D5_ODD_MAP[part] : D5_EVEN_MAP[part];
}

// D45 (Akshavedamsa): each sign split into 45 × 0°40' divisions
// Starting sign depends on sign's nature (ri % 3):
//   Movable (ri%3=0: Aries,Cancer,Libra,Cap)   → from sign itself  (+0)
//   Fixed   (ri%3=1: Taurus,Leo,Scorpio,Aqua)  → from 9th sign     (+8)
//   Dual    (ri%3=2: Gemini,Virgo,Sag,Pisces)  → from 5th sign     (+4)
function getD45Rasi(sidDeg) {
  var ri     = Math.floor(sidDeg / 30) % 12;
  var part   = Math.min(Math.floor((sidDeg % 30) / (30 / 45)), 44);
  var mod    = ri % 3;
  var offset = mod === 0 ? 0 : mod === 1 ? 8 : 4;
  return (ri + offset + part) % 12;
}

// D40 (Khavedamsha): each sign split into 40 × 0°45' divisions
// Odd signs  (Aries,Gemini,Leo,Libra,Sag,Aqua)        → count from Aries  (0)
// Even signs (Taurus,Cancer,Virgo,Scorpio,Cap,Pisces)  → count from Libra  (6)
function getD40Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 40)), 39);
  var start = (ri % 2 === 0) ? 0 : 6;
  return (start + part) % 12;
}

// D30 (Trimsamsa): UNEQUAL divisions — 5 parts per sign, ruled by planets
// The result sign is the planet-ruler's own sign (fixed assignment):
// Odd signs:  0–5°=Mars→Aries(0), 5–10°=Saturn→Aqua(10), 10–18°=Jupiter→Sag(8), 18–25°=Mercury→Gem(2), 25–30°=Venus→Lib(6)
// Even signs: 0–5°=Venus→Tau(1),  5–12°=Mercury→Vir(5),  12–20°=Jupiter→Pis(11), 20–25°=Saturn→Cap(9), 25–30°=Mars→Sco(7)
function getD30Rasi(sidDeg) {
  var ri  = Math.floor(sidDeg / 30) % 12;
  var deg = sidDeg % 30;
  if (ri % 2 === 0) {          // Odd sign
    if (deg <  5) return 0;    // Mars   → Aries
    if (deg < 10) return 10;   // Saturn → Aquarius
    if (deg < 18) return 8;    // Jupiter→ Sagittarius
    if (deg < 25) return 2;    // Mercury→ Gemini
    return 6;                  // Venus  → Libra
  } else {                     // Even sign
    if (deg <  5) return 1;    // Venus  → Taurus
    if (deg < 12) return 5;    // Mercury→ Virgo
    if (deg < 20) return 11;   // Jupiter→ Pisces
    if (deg < 25) return 9;    // Saturn → Capricorn
    return 7;                  // Mars   → Scorpio
  }
}

// D27 (Saptavimshamsha): each sign split into 27 × (30/27)° divisions
// Starting sign based on element (ri % 4):
//   Fire  (ri%4=0: Aries,Leo,Sag)         → Aries  (0)
//   Earth (ri%4=1: Taurus,Virgo,Cap)       → Cancer (3)
//   Air   (ri%4=2: Gemini,Libra,Aqua)      → Libra  (6)
//   Water (ri%4=3: Cancer,Scorpio,Pisces)  → Cap    (9)
function getD27Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 27)), 26);
  var mod   = ri % 4;
  var start = mod === 0 ? 0 : mod === 1 ? 3 : mod === 2 ? 6 : 9;
  return (start + part) % 12;
}

// D24 (Chaturvimshamsha / Siddhamsha): each sign split into 24 × 1°15' divisions
// Odd signs  (Aries,Gemini,Leo,Libra,Sag,Aqua)         → count from Leo    (4)
// Even signs (Taurus,Cancer,Virgo,Scorpio,Cap,Pisces)   → count from Cancer (3)
function getD24Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 24)), 23);
  var start = (ri % 2 === 0) ? 4 : 3;
  return (start + part) % 12;
}

// D20 (Vimshamsha): each sign split into 20 × 1°30' divisions
// Starting sign depends on sign's nature (ri % 3):
//   Movable (ri%3=0: Aries,Cancer,Libra,Cap)   → count from Aries (0)
//   Fixed   (ri%3=1: Taurus,Leo,Scorpio,Aqua)  → count from Sag   (8)
//   Dual    (ri%3=2: Gemini,Virgo,Sag,Pisces)  → count from Leo   (4)
function getD20Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / 1.5), 19);
  var mod   = ri % 3;
  var start = mod === 0 ? 0 : mod === 1 ? 8 : 4;
  return (start + part) % 12;
}

// D16 (Shodashamsha): each sign split into 16 × 1°52'30" divisions
// Starting sign depends on sign's nature (ri % 3):
//   Movable (ri%3=0: Aries,Cancer,Libra,Cap)   → count from Aries (0)
//   Fixed   (ri%3=1: Taurus,Leo,Scorpio,Aqua)  → count from Leo   (4)
//   Dual    (ri%3=2: Gemini,Virgo,Sag,Pisces)  → count from Sag   (8)
function getD16Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 16)), 15);
  var mod   = ri % 3;
  var start = mod === 0 ? 0 : mod === 1 ? 4 : 8;
  return (start + part) % 12;
}

// D11 (Rudramsha / Labh): each sign split into 11 × (30/11)° divisions
// Starting sign per D1 rasi: Aries→Aries, Taurus→Pisces, Gemini→Aqua ... (mirrors back)
// Formula: start = (12 - ri) % 12, then count forward 1 per division
// Equivalent to: 11 signs forward per division (11 mod 12 = -1, same as 1 backward)
function getD11Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 11)), 10);
  var start = (12 - ri) % 12;
  return (start + part) % 12;
}

// D10 (Dashamsha): each sign split into 10 × 3° divisions
// Odd signs:  count starts from the sign itself   (ri + part)
// Even signs: count starts from the 9th sign away (ri+8 + part)
function getD10Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / 3), 9);
  var isOdd = ri % 2 === 0;
  var start = isOdd ? ri : (ri + 8) % 12;
  return (start + part) % 12;
}

// D8 (Ashtamsa): each sign split into 8 × 3°45' divisions
// Starting sign depends on sign's nature (ri % 3):
//   Saram  (ri%3=0: Aries,Cancer,Libra,Cap)       → count from Aries (Mesham=0)
//   Sthiram(ri%3=1: Taurus,Leo,Scorpio,Aqua)       → count from Sag   (Dhanusu=8)
//   Ubayam (ri%3=2: Gemini,Virgo,Sag,Pisces)       → count from Leo   (Simmam=4)
function getD8Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / 3.75), 7);
  var mod   = ri % 3;
  var start = mod === 0 ? 0 : mod === 1 ? 8 : 4;
  return (start + part) % 12;
}

// D7 (Saptamsha): each sign split into 7 × (30/7)° divisions
// Odd signs:  count starts from the sign itself      (+0, +1 … +6)
// Even signs: count starts from the 7th sign away    (ri+6, then +0 … +6)
function getD7Rasi(sidDeg) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30 / 7)), 6);
  var isOdd = ri % 2 === 0;
  var start = isOdd ? ri : (ri + 6) % 12;
  return (start + part) % 12;
}

// D6 (Shashtamsa): each sign split into 6 × 5° divisions
// Male/Odd signs:   Aries→Taurus→Gemini→Cancer→Leo→Virgo   (0–5)
// Female/Even signs: Libra→Scorpio→Sag→Cap→Aquarius→Pisces  (6–11)
var D6_ODD_MAP  = [0, 1, 2, 3, 4, 5];
var D6_EVEN_MAP = [6, 7, 8, 9, 10, 11];
function getD6Rasi(sidDeg) {
  var ri   = Math.floor(sidDeg / 30) % 12;
  var part = Math.min(Math.floor((sidDeg % 30) / 5), 5);
  return (ri % 2 === 0) ? D6_ODD_MAP[part] : D6_EVEN_MAP[part];
}
// Always counted from the sign itself (Kendra method):
// 1st div (0–7.5°)   → same sign (+0)
// 2nd div (7.5–15°)  → 4th from sign (+3)
// 3rd div (15–22.5°) → 7th from sign (+6)
// 4th div (22.5–30°) → 10th from sign (+9)
var D4_OFFSETS = [0, 3, 6, 9];
function getD4Rasi(sidDeg) {
  var ri   = Math.floor(sidDeg / 30) % 12;
  var part = Math.min(Math.floor((sidDeg % 30) / 7.5), 3);
  return (ri + D4_OFFSETS[part]) % 12;
}

function getGenericVargaRasi(sidDeg, N, oddStart, evenStart) {
  var ri    = Math.floor(sidDeg / 30) % 12;
  var part  = Math.min(Math.floor((sidDeg % 30) / (30/N)), N-1);
  var isOdd = ri % 2 === 0;
  var start = isOdd ? oddStart : (evenStart === null ? ri : evenStart);
  return (start + part) % 12;
}

// ── Master dispatcher — all correct Parasara rules
function calcVargaForDeg(sidDeg, d) {
  switch(d) {
    case 1:  return Math.floor(sidDeg / 30) % 12;
    case 2:  return getHoraRasi(sidDeg);
    case 3:  return getDrekkanaRasi(sidDeg);
    case 4:  return getD4Rasi(sidDeg);                        // Kendra method: +0/+3/+6/+9 from sign
    case 5:  return getD5Rasi(sidDeg);                        // Thirukanidham D5 mapping
    case 6:  return getD6Rasi(sidDeg);                        // Male→Ar..Vi, Female→Li..Pi
    case 7:  return getD7Rasi(sidDeg);                        // Odd→from sign, Even→from 7th
    case 8:  return getD8Rasi(sidDeg);                        // Saram→Ar, Sthiram→Sag, Ubayam→Leo
    case 9:  return getNavamsaRasiCorrect(sidDeg);             // Parasara NAV_START
    case 10: return getD10Rasi(sidDeg);                       // Odd→from sign, Even→from 9th
    case 11: return getD11Rasi(sidDeg);                       // start=(12-ri)%12, +1 per div
    case 12: return getDwadasamsaRasi(sidDeg);                 // starts from sign
    case 16: return getD16Rasi(sidDeg);                       // Movable→Ar, Fixed→Le, Dual→Sag
    case 20: return getD20Rasi(sidDeg);                       // Movable→Aries, Fixed→Sag, Dual→Leo
    case 24: return getD24Rasi(sidDeg);                       // Odd→Leo, Even→Cancer
    case 27: return getD27Rasi(sidDeg);                       // Fire→Ar, Earth→Ca, Air→Li, Water→Cap
    case 30: return getD30Rasi(sidDeg);                       // Unequal divisions, ruler's own sign
    case 40: return getD40Rasi(sidDeg);                       // Odd→Aries, Even→Libra
    case 45: return getD45Rasi(sidDeg);                       // Movable→sign, Fixed→9th, Dual→5th
    case 60: return getShashtiamsaRasi(sidDeg);
    default: return Math.floor(sidDeg / 30) % 12;
  }
}

// ── Also fix getNavamsaRasi (used in gochara) to use same correct formula
function getNavamsaRasi(sidDeg) { return getNavamsaRasiCorrect(sidDeg); }

// ── Calculate all 20 vargas
function calcShodashavarga(birthData, includeUNP) {
  var positions = birthData.positions;
  var lagna     = birthData.lagna;
  var mandi     = birthData.mandi || null;
  // Planet slice: always include 0-8 (Sun..Ketu). Optionally include 9,10,11 (U,N,P).
  var plCount = (includeUNP && positions && positions.length >= 12) ? 12 : 9;
  var result    = {};
  VARGA_INFO.forEach(function(vi) {
    var d      = vi.d;
    var lagRi  = calcVargaForDeg(lagna.sidDeg, d);
    var planRis = positions.slice(0, plCount).map(function(p) {
      return calcVargaForDeg(p.sidDeg, d);
    });
    var mandiRi = mandi ? calcVargaForDeg(mandi.sidDeg, d) : -1;
    result[d] = { lagRi:lagRi, planRis:planRis, mandiRi:mandiRi };
  });
  // D3 Jaimini (element/trine method) — stored separately
  result["3j"] = {
    lagRi:  getDrekkanaJaiminiRasi(lagna.sidDeg),
    planRis: positions.slice(0, 9).map(function(p) { return getDrekkanaJaiminiRasi(p.sidDeg); }),
    mandiRi: mandi ? getDrekkanaJaiminiRasi(mandi.sidDeg) : -1
  };
  // ── Jaimini Chara Karaka (7 karakas, excluding Rahu & Ketu from ranking)
  // Rule: rank Sun,Moon,Mars,Mercury,Jupiter,Venus,Saturn by degree-within-sign descending
  // Rahu/Ketu special rule:
  //   If Rahu has highest degree-in-sign among planets → Rahu's sign lord gets AK rank
  //   If Ketu has highest degree-in-sign among planets → Rahu (not Ketu) gets the rank
  // The 7 karakas in order: AK, AmK, BK, MK, PK, GK, DK
  var KARAKA_NAMES_EN = ["Atmakaraka","Amatyakaraka","Bhratrukaraka","Matrukaraka","Putrakaraka","Gnatikaraka","Darakaraka"];
  var KARAKA_NAMES_TA = ["ஆத்மகாரகன்","அமாத்யகாரகன்","பிரத்ருகாரகன்","மாத்ருகாரகன்","புத்ரகாரகன்","ஞாதிகாரகன்","தாரகாரகன்"];
  var KARAKA_SHORT_EN = ["AK","AmK","BK","MK","PK","GK","DK"];
  var KARAKA_MEANING_EN = ["Soul significator","Career / Minister","Siblings","Mother","Children","Enemies / Obstacles","Spouse"];
  var KARAKA_MEANING_TA = ["ஆன்மா காரகன்","தொழில் / அமைச்சர்","உடன்பிறப்பு","தாய்","பிள்ளைகள்","எதிரிகள் / தடைகள்","வாழ்க்கைத்துணை"];

  // Planets 0-6 = Sun,Moon,Mars,Mercury,Jupiter,Venus,Saturn (exclude Rahu=7, Ketu=8)
  // Jaimini rule: retrograde planets count degree from END of sign (30 - deg_in_sign)
  var karakaPool = []; // { pl, inSign }
  positions.slice(0, 7).forEach(function(p, i) {
    var raw = p.sidDeg % 30;
    var inSign = p.retro ? (30 - raw) : raw;
    karakaPool.push({ pl:i, inSign: inSign, retro: !!p.retro });
  });
  // Check Rahu(7) and Ketu(8) — Rahu/Ketu are always retrograde by nature
  // For Jaimini: Rahu inSign uses (30 - raw) since Rahu is always retrograde
  var rahuRaw = positions[7] ? positions[7].sidDeg % 30 : 0;
  var ketuRaw = positions[8] ? positions[8].sidDeg % 30 : 0;
  var rahuInSign = 30 - rahuRaw;  // Rahu always retrograde
  var ketuInSign = 30 - ketuRaw;  // Ketu always retrograde
  // Rahu/Ketu can compete for AK only — if their in-sign degree beats all 7 planets,
  // Rahu (or Rahu as stand-in for Ketu) takes AK and pushes others down
  var maxPlanetDeg = karakaPool.reduce(function(mx, k){ return k.inSign > mx ? k.inSign : mx; }, 0);
  var rahuIsAK = false, rahuWasByKetu = false;
  if (rahuInSign > maxPlanetDeg) {
    rahuIsAK = true;
  } else if (ketuInSign > maxPlanetDeg) {
    rahuIsAK = true;
    rahuWasByKetu = true;
  }

  // Sort pool descending by inSign
  karakaPool.sort(function(a,b){ return b.inSign - a.inSign; });

  // Assign karakas
  var karakas = [];
  if (rahuIsAK) {
    // Rahu takes slot 0 (AK), planets fill slots 1-6 (AmK..DK)
    karakas.push({ pl:7, inSign: rahuIsAK && !rahuWasByKetu ? rahuInSign : ketuInSign,
      actualPl: rahuWasByKetu ? 8 : 7, byKetu: rahuWasByKetu });
    karakaPool.slice(0, 6).forEach(function(k){ karakas.push(k); });
  } else {
    karakaPool.slice(0, 7).forEach(function(k){ karakas.push(k); });
  }

  result.karakas        = karakas;      // array of 7: [{pl, inSign}, ...]  pl=0-8
  result.atmakaraka     = karakas[0].pl; // planet index of AK (may be 7=Rahu)
  result.akDegInSign    = karakas[0].inSign;
  result.rahuIsAK       = rahuIsAK;
  result.rahuWasByKetu  = rahuWasByKetu;
  result.karakamsa      = result[9] ? result[9].planRis[Math.min(result.atmakaraka, 8)] : null;
  return result;
}

  var rN  = function(i){ return isTA ? RS_TA[i]   : RS_EN[i]; };
  var nkN = function(i){ return isTA ? NK[i][0]   : NK[i][1]; };
  function rasiToHouse(ri) { return ((ri - lagRi + 12) % 12) + 1; }
  function houseLord(h) { return RS_LORD[(lagRi + h - 1) % 12]; }

  var positions = birthData.positions || [];
  var d1LagRi   = birthData.lagna.ri;
  function d1House(ri) { return ((ri - d1LagRi + 12) % 12) + 1; }

  // ── 1. Trikona / Kendra grouping ──────────────────────────────
  var TRIKONA = [1,5,9], KENDRA = [4,7,10], UPACHAYA = [3,6,11], DHANA = [2,8,12];
  function houseGroup(h) {
    if (TRIKONA.indexOf(h) !== -1) return { label:isTA?"திரிகோணம்":"Trikona", color:"#44ff88", abbr:"T" };
    if (KENDRA.indexOf(h)  !== -1) return { label:isTA?"கேந்திரம்":"Kendra",  color:"#55ddff", abbr:"K" };
    if (UPACHAYA.indexOf(h)!== -1) return { label:isTA?"உபசயம்":"Upachaya",   color:"#ffaa44", abbr:"U" };
    return                                 { label:isTA?"தன ஸ்தானம்":"Dhana",  color:"#cc88ff", abbr:"D" };
  }

  var trikonaPlans = [], kendraPlans = [], otherPlans = [];
  planRis.forEach(function(vRi, i) {
    var h = rasiToHouse(vRi);
    var g = houseGroup(h);
    var entry = { pl:i, name:pN(i), color:plClr(i), house:h, group:g };

    else                                  otherPlans.push(entry);
  });
  // Lagna
  var lagH = rasiToHouse(lagRi);
  var lagG = houseGroup(lagH);

  // ── 2. Nakshatra Saram ─────────────────────────────────────────
  // For each planet: which house does its star lord occupy?
  // That star lord house reveals the "saram" (essence) of the planet
  var nkSaram = planRis.map(function(vRi, i) {
    var p = positions[i];

      nkName: nkN(p.ni), pada: Math.min(Math.floor(((p.sidDeg*60)-(p.ni*800))/200)+1,4) };
  }).filter(Boolean);

  // ── 3. Vayathottam (Age Progression) ──────────────────────────
