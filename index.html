                :"If the KP Chart is used repeatedly to recheck the same question, the result may be incorrect or misleading. This method should only be used when necessary and not for repeated verification of the same matter."
            )
          ),
          ce("button",{
            onClick:function(){setNoticeBirth(false);},
            style:{background:"none",border:"none",color:isDark?"#aa8800":"#cc9900",
              cursor:"pointer",fontSize:"16px",flexShrink:0,padding:"0 4px",lineHeight:1}
          }, "✕")
        ),
        ce(BirthForm,{lang:lang, onGenerate:handleBirth, initialValues:initVals}),
        birthData && ce(ChartOutput,{data:birthData,lang:lang,deductCoins:deductCoins})
      ),
      tab==="gochara" && ce("div",null,
        gocharaData && ce("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}},
          ce("button",{onClick:printGochara,
            style:{padding:"5px 14px",background:C.bg4,border:"1px solid "+C.acc,
              borderRadius:"6px",color:C.acc2,cursor:"pointer",fontSize:"11px",fontWeight:700}},
            "🖨 "+(isTA?"கோச்சார PDF":"Gochara PDF"))),
        ce(GocharaForm,{lang:lang,onGenerate:setGocharaData}),
        gocharaData && ce(ChartOutput,{key:"gochara-"+(gocharaData.T||0),data:gocharaData,lang:lang,deductCoins:deductCoins})
      ),
      tab==="kp249" && ce("div",null,
        // ── Print PDF Button
        kpData && ce("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}},
          ce("button",{onClick:printKPLookup,
            style:{padding:"5px 14px",background:C.bg4,border:"1px solid "+C.acc,
              borderRadius:"6px",color:C.acc2,cursor:"pointer",fontSize:"11px",fontWeight:700}},
            "🖨 "+(isTA?"பிரசினம் PDF":"Prasnam PDF"))),
        // ── Important Notice
        fbUser && noticeKP && ce("div",{style:{
          background:isDark?"#1a1200":"#fffbe6",
          border:"1px solid "+(isDark?"#aa8800":"#e6c000"),
          borderLeft:"4px solid "+(isDark?"#ffcc00":"#cc9900"),
          borderRadius:"8px",padding:"12px 14px",marginBottom:"12px",
          display:"flex",gap:"10px",alignItems:"flex-start"}},
          ce("div",{style:{fontSize:"18px",flexShrink:0}}, "⚠️"),
          ce("div",{style:{flex:1}},
            ce("div",{style:{fontWeight:700,fontSize:"12px",color:isDark?"#ffcc00":"#7a5a00",marginBottom:"4px"}},
              isTA?"முக்கியமான குறிப்பு":"Important Note"),
            ce("div",{style:{fontSize:"12px",color:isDark?"#ccaa44":"#5a4400",lineHeight:1.7}},
              isTA
                ?"ஒரே கேள்வியை மீண்டும் மீண்டும் சரிபார்க்க KP எண் தேடலை பயன்படுத்தினால், விடை தவறாகவோ தவறாக வழிநடத்துவதாகவோ இருக்கலாம். இந்த முறை தேவையான நேரத்தில் மட்டுமே பயன்படுத்தவும்."
                :"If the KP Lookup is used repeatedly to recheck the same question, the result may be incorrect or misleading. This method should only be used when necessary and not for repeated verification of the same matter."
            )
          ),
          ce("button",{
            onClick:function(){setNoticeKP(false);},
            style:{background:"none",border:"none",color:isDark?"#aa8800":"#cc9900",
              cursor:"pointer",fontSize:"16px",flexShrink:0,padding:"0 4px",lineHeight:1}
          }, "✕")
        ),
        ce(KPLookupForm,{lang:lang,onGenerate:function(ni, question){
          var detectedTopic = detectTopicFromQuestion(question);
          var d = calcKPLookup(ni, gocharaData);
          if (d) { d.prasnamQuestion = question||""; d.prasnamTopic = detectedTopic; }
          setKpData(d);
          setLastKpNum(ni);
        }}),
        kpData && ce(ChartOutput,{key:"kp-"+(kpData.kpNum||"0"),data:kpData,lang:lang,deductCoins:deductCoins}),
        kpData && (function(){
          var prasnamQ = kpData.prasnamQuestion || "";
          var topicId  = kpData.prasnamTopic   || null;
          var GENERIC_TOPIC = { id:"generic", en:"General Query", ta:"பொதுவான கேள்வி",
            mainHouse:1, promiseH:[1,6,11], deny:[4,8,12], isGeneric:true };
          var topic = topicId
            ? (QUERY_TOPICS.find(function(q){return q.id===topicId;}) || GENERIC_TOPIC)
            : GENERIC_TOPIC;
          if (!prasnamQ) return null;
          return ce("div",{style:{marginTop:"10px"}},
            ce(PrasnamChat,{
              key:"prasnam-"+(kpData.kpNum||"0"),
              lang:lang,
              data:kpData,
              topic:topic,
              question:prasnamQ,
              lagRiP:kpData.lagna ? kpData.lagna.ri : 0
            })
          );
        })()
      ),
      tab==="varga" && ce("div",null,
        birthData && ce("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}},
          ce("button",{onClick:printShodasha,
            style:{padding:"5px 14px",background:C.bg4,border:"1px solid "+C.acc,
              borderRadius:"6px",color:C.acc2,cursor:"pointer",fontSize:"11px",fontWeight:700}},
            "🖨 "+(isTA?"ஷோடசவர்க்க PDF":"Shodashavarga PDF"))),
        ce("div",{style:{background:isDark?C.bg4:"#fffdf5",border:"1px solid "+(isDark?C.bdr:"#d4b86a"),borderRadius:"9px",
          padding:"10px 14px",marginBottom:"12px"}},
          ce("div",{style:{color:isDark?C.acc:"#8B6914",fontWeight:700,fontSize:"11px",letterSpacing:"1px",
            textTransform:"uppercase",marginBottom:"8px"}},
            isTA?"பிறப்பு விவரங்கள்":"Birth Details"),
          ce(BirthForm,{lang:lang, onGenerate:function(input){
            try {
              var astro = calcAll(input.year,input.month,input.day,input.utHr,input.lat,input.lon);
              setBirthData(Object.assign({},astro,{input:input,mode:"birth"}));
              saveToHistory(input);
            } catch(e){ alert("Calculation error: "+e.message); }
          }, initialValues: birthData ? birthData.input : initVals})
        ),
        ce(ShodashavargaPage,{lang:lang, birthData:birthData})
      )
    )
  )); // close ThemeCtx.Provider
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    }); // end DOMContentLoaded
  </script>
